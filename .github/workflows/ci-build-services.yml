name: 'CI: Build Services'

# ============================================================================
# Purpose: Build and push Docker images to ACR (independent of deployment)
# Triggers: Push to main with service changes
# Duration: ~10 minutes
# Blocks: No (async, deployments can use these images)
# Use Case: Pre-build images for faster deployments
# ============================================================================

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'platform/RiskInsure.PublicContracts/**'
      - '.github/workflows/ci-build-services.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
      tag:
        description: 'Additional tag (e.g., "hotfix", "v1.2.3")'
        type: string
        required: false

env:
  REGISTRY: 'riskinsuredevacr.azurecr.io'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-build-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================================
  # Determine which services changed
  # ==========================================================================
  determine-services:
    name: 'Determine Services'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
      matrix_empty: ${{ steps.determine.outputs.matrix_empty }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Determine Changed Services
        id: determine
        shell: bash
        run: |
          ALL_SERVICES='["billing","customer","fundstransfermgt","policy","ratingandunderwriting"]'
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          
          # Capture changed files once
          changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          
          # Check if workflow file changed - build all services
          if echo "$changed_files" | grep -q '^\.github/workflows/ci-build-services\.yml$'; then
            echo "Workflow file changed - building all services"
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Check if shared dependencies changed - build all services
          if echo "$changed_files" | grep -q '^platform/RiskInsure\.PublicContracts/'; then
            echo "Shared contracts changed - building all services"
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Detect changed services from changed files
          changed_services=()
          
          for service in billing customer fundstransfermgt policy ratingandunderwriting; do
            if echo "$changed_files" | grep -q "^services/$service/"; then
              changed_services+=("\"$service\"")
            fi
          done
          
          if [ ${#changed_services[@]} -eq 0 ]; then
            echo "No service changes detected"
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
          else
            services_json="[$(IFS=,; echo "${changed_services[*]}")]"
            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Summary
        shell: bash
        run: |
          echo "### 🏗️ Services to Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`${{ steps.determine.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build:
    name: 'Build: ${{ matrix.service }}'
    needs: determine-services
    if: needs.determine-services.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Map Service Names
        id: map_early
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          
          # Map service names to directory structure
          case "$SERVICE" in
            ratingandunderwriting)
              SERVICE_DIR="services/ratingandunderwriting"
              ;;
            fundstransfermgt)
              SERVICE_DIR="services/fundstransfermgt"
              ;;
            billing|customer|policy)
              SERVICE_DIR="services/$SERVICE"
              ;;
            *)
              echo "❌ Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          
          echo "service_dir=$SERVICE_DIR" >> "$GITHUB_OUTPUT"
      
      - name: Restore Dependencies
        shell: bash
        run: |
          SERVICE_DIR="${{ steps.map_early.outputs.service_dir }}"
          echo "📦 Restoring dependencies for ${{ matrix.service }}..."
          
          # Restore API project
          dotnet restore "$SERVICE_DIR/src/Api"
          
          # Restore Endpoint project
          dotnet restore "$SERVICE_DIR/src/Endpoint.In"
          
          echo "✅ Dependencies restored"
      
      - name: Build .NET Projects
        shell: bash
        run: |
          SERVICE_DIR="${{ steps.map_early.outputs.service_dir }}"
          echo "🔨 Building .NET projects for ${{ matrix.service }}..."
          
          # Build API project
          dotnet build "$SERVICE_DIR/src/Api" --configuration Release --no-restore
          
          # Build Endpoint project
          dotnet build "$SERVICE_DIR/src/Endpoint.In" --configuration Release --no-restore
          
          echo "✅ .NET build successful"
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get ACR Name
        id: acr
        shell: bash
        run: |
          RG="CAIS-010-RiskInsure"
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "📦 ACR: $ACR_NAME"
      
      - name: ACR Login
        run: |
          az acr login --name ${{ steps.acr.outputs.acr_name }}
      
      - name: Map Service Names
        id: map
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          
          # Map service names to directory structure and image names (match build-and-deploy.yml)
          case "$SERVICE" in
            ratingandunderwriting)
              SERVICE_DIR="services/ratingandunderwriting"
              IMAGE_NAME="ratingandunderwriting"
              ;;
            fundstransfermgt)
              SERVICE_DIR="services/fundstransfermgt"
              IMAGE_NAME="fundstransfermgt"
              ;;
            billing|customer|policy)
              SERVICE_DIR="services/$SERVICE"
              IMAGE_NAME="$SERVICE"
              ;;
            *)
              echo "❌ Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          
          echo "service_dir=$SERVICE_DIR" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ Service: $SERVICE → Dir: $SERVICE_DIR, Image: $IMAGE_NAME"
      
      - name: Set Image Tags
        id: tags
        shell: bash
        run: |
          IMAGE_NAME="${{ steps.map.outputs.image_name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          
          # Set as outputs for use in subsequent steps
          echo "api_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-api:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "api_image_short=${{ env.REGISTRY }}/${IMAGE_NAME}-api:$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-api:latest" >> "$GITHUB_OUTPUT"
          echo "endpoint_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "endpoint_image_short=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "endpoint_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:latest" >> "$GITHUB_OUTPUT"
          
          echo "✅ Image tags configured"
      
      - name: Build API Image
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          
          echo "🔨 Building API image..."
          echo "   Dockerfile: $SERVICE_DIR/src/Api/Dockerfile"
          
          docker build \
            -f "$SERVICE_DIR/src/Api/Dockerfile" \
            -t "${{ steps.tags.outputs.api_image_sha }}" \
            -t "${{ steps.tags.outputs.api_image_short }}" \
            -t "${{ steps.tags.outputs.api_image_latest }}" \
            --build-arg SERVICE_NAME=$SERVICE \
            .
          
          echo "✅ API image built"
      
      - name: Build Endpoint Image
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          
          echo "🔨 Building Endpoint image..."
          echo "   Dockerfile: $SERVICE_DIR/src/Endpoint.In/Dockerfile"
          
          docker build \
            -f "$SERVICE_DIR/src/Endpoint.In/Dockerfile" \
            -t "${{ steps.tags.outputs.endpoint_image_sha }}" \
            -t "${{ steps.tags.outputs.endpoint_image_short }}" \
            -t "${{ steps.tags.outputs.endpoint_image_latest }}" \
            --build-arg SERVICE_NAME=$SERVICE \
            .
          
          echo "✅ Endpoint image built"
      
      - name: Add Custom Tags (Optional)
        id: custom_tags
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        shell: bash
        run: |
          IMAGE_NAME="${{ steps.map.outputs.image_name }}"
          CUSTOM_TAG="${{ github.event.inputs.tag }}"
          
          API_IMAGE_CUSTOM="${{ env.REGISTRY }}/${IMAGE_NAME}-api:$CUSTOM_TAG"
          ENDPOINT_IMAGE_CUSTOM="${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:$CUSTOM_TAG"
          
          docker tag "${{ steps.tags.outputs.api_image_sha }}" "$API_IMAGE_CUSTOM"
          docker tag "${{ steps.tags.outputs.endpoint_image_sha }}" "$ENDPOINT_IMAGE_CUSTOM"
          
          echo "api_image_custom=$API_IMAGE_CUSTOM" >> "$GITHUB_OUTPUT"
          echo "endpoint_image_custom=$ENDPOINT_IMAGE_CUSTOM" >> "$GITHUB_OUTPUT"
      
      - name: Push Images to ACR
        shell: bash
        run: |
          echo "📤 Pushing API images to ACR..."
          docker push "${{ steps.tags.outputs.api_image_sha }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.api_image_sha }}"
          
          docker push "${{ steps.tags.outputs.api_image_short }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.api_image_short }}"
          
          docker push "${{ steps.tags.outputs.api_image_latest }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.api_image_latest }}"
          
          if [[ -n "${{ steps.custom_tags.outputs.api_image_custom }}" ]]; then
            docker push "${{ steps.custom_tags.outputs.api_image_custom }}"
            echo "✅ Pushed: ${{ steps.custom_tags.outputs.api_image_custom }}"
          fi
          
          echo ""
          echo "📤 Pushing Endpoint images to ACR..."
          docker push "${{ steps.tags.outputs.endpoint_image_sha }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.endpoint_image_sha }}"
          
          docker push "${{ steps.tags.outputs.endpoint_image_short }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.endpoint_image_short }}"
          
          docker push "${{ steps.tags.outputs.endpoint_image_latest }}"
          echo "✅ Pushed: ${{ steps.tags.outputs.endpoint_image_latest }}"
          
          if [[ -n "${{ steps.custom_tags.outputs.endpoint_image_custom }}" ]]; then
            docker push "${{ steps.custom_tags.outputs.endpoint_image_custom }}"
            echo "✅ Pushed: ${{ steps.custom_tags.outputs.endpoint_image_custom }}"
          fi
      
      - name: Image Manifest
        shell: bash
        run: |
          echo "### 📦 ${{ matrix.service }} Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### API Images" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full SHA | \`${{ steps.tags.outputs.api_image_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Short SHA | \`${{ steps.tags.outputs.api_image_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | \`${{ steps.tags.outputs.api_image_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ -n "${{ steps.custom_tags.outputs.api_image_custom }}" ]]; then
            echo "| Custom | \`${{ steps.custom_tags.outputs.api_image_custom }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Endpoint Images" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full SHA | \`${{ steps.tags.outputs.endpoint_image_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Short SHA | \`${{ steps.tags.outputs.endpoint_image_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | \`${{ steps.tags.outputs.endpoint_image_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ -n "${{ steps.custom_tags.outputs.endpoint_image_custom }}" ]]; then
            echo "| Custom | \`${{ steps.custom_tags.outputs.endpoint_image_custom }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - name: Generate SBOM for API Image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.api_image_sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

  # ==========================================================================
  # Vulnerability Scanning (Optional but Recommended)
  # ==========================================================================
  scan:
    name: 'Scan: ${{ matrix.service }}'
    needs: [determine-services, build]
    if: needs.determine-services.outputs.matrix_empty == 'false' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get ACR Name
        id: acr
        shell: bash
        run: |
          RG="CAIS-010-RiskInsure"
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
      
      - name: ACR Login
        run: |
          az acr login --name ${{ steps.acr.outputs.acr_name }}
      
      - name: Map Service Names
        id: map
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          
          # Map service names (match build job)
          case "$SERVICE" in
            ratingandunderwriting)
              IMAGE_NAME="ratingandunderwriting"
              ;;
            fundstransfermgt)
              IMAGE_NAME="fundstransfermgt"
              ;;
            billing|customer|policy)
              IMAGE_NAME="$SERVICE"
              ;;
            *)
              echo "❌ Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
      
      - name: Pull API Image
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.map.outputs.image_name }}-api:${{ github.sha }}"
          docker pull "$IMAGE"
      
      - name: Pull Endpoint Image
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.map.outputs.image_name }}-endpoint:${{ github.sha }}"
          docker pull "$IMAGE"
      
      - name: Run Trivy Scan on API Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.map.outputs.image_name }}-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}-api.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Run Trivy Scan on Endpoint Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.map.outputs.image_name }}-endpoint:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}-endpoint.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload API Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}-api.sarif'
          category: 'container-${{ matrix.service }}-api'
      
      - name: Upload Endpoint Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}-endpoint.sarif'
          category: 'container-${{ matrix.service }}-endpoint'
      
      - name: Upload API Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results-${{ matrix.service }}-api
          path: trivy-results-${{ matrix.service }}-api.sarif
          retention-days: 30
      
      - name: Upload Endpoint Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results-${{ matrix.service }}-endpoint
          path: trivy-results-${{ matrix.service }}-endpoint.sarif
          retention-days: 30

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: 'Build Summary'
    needs: [determine-services, build, scan]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🏗️ Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Event:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📋 Job Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Determine Services | ${{ needs.determine-services.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | ${{ needs.scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.determine-services.outputs.matrix_empty }}" == "true" ]]; then
            echo "ℹ️ No services to build (no changes detected)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All images built and pushed successfully" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Services:** ${{ needs.determine-services.outputs.services }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Registry:** \`${{ env.REGISTRY }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 🔐 Security Scan" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${{ needs.scan.result }}" == "success" ]]; then
              echo "✅ Vulnerability scan completed. Check Security tab for results." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Vulnerability scan failed or skipped." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "❌ Some builds failed. Check logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
