# ============================================================================
# CI: Build Services
# Purpose: Build and push Docker images to ACR for services that changed.
# Triggers: push to `main` when services or public contracts change; manual
# dispatch via `workflow_dispatch` supports building selected services.
# Outputs: uploads `cd-inputs` artifact containing `image_tag` and `services`.
# Notes: CI tags images with the full commit SHA and `latest`.
# ============================================================================
name: 'CI: Build Services'

on:
  push:
    branches:
      - main
      - Dev
    paths:
      - 'services/**'
      - 'platform/RiskInsure.PublicContracts/**'
      - 'platform/modernizationpatterns/Api/**'
      - 'platform/modernizationpatterns/Dockerfile.chat-api'
      - 'platform/modernizationpatterns/Dockerfile.reindex-worker'
      - '.github/scripts/managed-services.sh'
      - '.github/workflows/ci-build-services.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
        type: string

env:
  REGISTRY: 'riskinsuredevacr.azurecr.io'
  ACR_NAME: 'riskinsuredevacr'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-build-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Determine Services
  # Purpose: Inspect the commit to decide which services changed and set
  # outputs: `services`, `matrix_empty`, `image_tag`, and `trigger_reason`
  # for downstream CD jobs.
  # --------------------------------------------------------------------------
  determine-services:
    name: 'Determine Services'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
      matrix_empty: ${{ steps.determine.outputs.matrix_empty }}
      image_tag: ${{ steps.determine.outputs.image_tag }}
      trigger_reason: ${{ steps.determine.outputs.trigger_reason }}
      infra_changed: ${{ steps.determine.outputs.infra_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Changed Services
        id: determine
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_SHA: ${{ github.sha }}
          GH_EVENT_BEFORE: ${{ github.event.before }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
        run: |
          set -euo pipefail

          source .github/scripts/managed-services.sh

          ALL_SERVICES="$(managed_services_json)"
          echo "image_tag=$GH_SHA" >> "$GITHUB_OUTPUT"

          if [[ "$GH_EVENT_NAME" == "workflow_dispatch" ]]; then
            services_input="$INPUT_SERVICES"
            normalized_input=$(echo "$services_input" | tr '[:upper:]' '[:lower:]')
            services_json="$(parse_dispatch_services_input "$services_input")"

            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            echo "infra_changed=false" >> "$GITHUB_OUTPUT"
            if [[ "$normalized_input" == "all" ]]; then
              echo "trigger_reason=manual-all-services" >> "$GITHUB_OUTPUT"
            else
              echo "trigger_reason=manual-selected-services" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BEFORE="$GH_EVENT_BEFORE"
          SHA="$GH_SHA"

          # Handle edge case where BEFORE is all zeros (first push / unusual push scenario)
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            changed_files=$(git show --pretty="" --name-only "$SHA" || true)
          else
            changed_files=$(git diff --name-only "$BEFORE" "$SHA" || true)
          fi

          echo "### Changed files (CI debug)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$changed_files" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          if [[ -z "$changed_files" ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
            echo "infra_changed=false" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=no-changed-files" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          infra_changed="false"
          if echo "$changed_files" | grep -Eq '^platform/infra/foundation/|^platform/infra/shared-services/|^\.github/workflows/cd-infra-dev\.yml$'; then
            infra_changed="true"
          fi
          echo "infra_changed=$infra_changed" >> "$GITHUB_OUTPUT"

          # Workflow change -> build all
          if echo "$changed_files" | grep -q '^\.github/workflows/ci-build-services\.yml$'; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=ci-workflow-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Managed services helper change -> build all
          if echo "$changed_files" | grep -q '^\.github/scripts/managed-services\.sh$'; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=managed-services-script-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Shared contracts change -> build all
          if echo "$changed_files" | grep -q '^platform/RiskInsure\.PublicContracts/'; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=public-contracts-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          services_json="$(detect_services_from_changed_files "$changed_files")"
          service_count="$(echo "$services_json" | jq -r 'length')"

          if [[ "$service_count" -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=no-managed-service-changes" >> "$GITHUB_OUTPUT"
          else
            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=service-path-changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_SHA: ${{ github.sha }}
          OUT_IMAGE_TAG: ${{ steps.determine.outputs.image_tag }}
          OUT_SERVICES: ${{ steps.determine.outputs.services }}
          OUT_MATRIX_EMPTY: ${{ steps.determine.outputs.matrix_empty }}
          OUT_INFRA_CHANGED: ${{ steps.determine.outputs.infra_changed }}
          OUT_TRIGGER_REASON: ${{ steps.determine.outputs.trigger_reason }}
        run: |
          echo "### 🏗️ Services to Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`$GH_EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`$GH_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`$OUT_IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`$OUT_SERVICES\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Matrix empty:** \`$OUT_MATRIX_EMPTY\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Infra changed:** \`$OUT_INFRA_CHANGED\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger reason:** \`$OUT_TRIGGER_REASON\`" >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Wait For Infra
  # Purpose: On commits that modify shared foundation infra, wait for the
  # infrastructure CD workflow for this same commit SHA before building images.
  # --------------------------------------------------------------------------
  wait-for-infra:
    name: 'Wait: Infra Ready'
    needs: determine-services
    if: github.event_name == 'push' && needs.determine-services.outputs.infra_changed == 'true' && needs.determine-services.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: 'Wait for CD: Infrastructure Dev workflow'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'cd-infra-dev.yml';
            const targetSha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const maxAttempts = 3;
            const delayMs = 50000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: 'push',
                branch: 'main',
                per_page: 50,
              });

              const run = data.workflow_runs.find(r => r.head_sha === targetSha);

              if (!run) {
                core.info(`Attempt ${attempt}/${maxAttempts}: infra workflow run not visible yet for ${targetSha}.`);
              } else {
                core.info(`Attempt ${attempt}/${maxAttempts}: infra run ${run.id} status=${run.status}, conclusion=${run.conclusion ?? 'n/a'}.`);

                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    core.info('Infrastructure workflow completed successfully for this commit.');
                    return;
                  }

                  core.setFailed(`Infrastructure workflow completed with conclusion='${run.conclusion}'.`);
                  return;
                }
              }

              await new Promise(resolve => setTimeout(resolve, delayMs));
            }

            core.setFailed(`Timed out waiting for ${workflowId} to complete for commit ${targetSha}.`);

  # --------------------------------------------------------------------------
  # Build
  # Purpose: Build, tag, and push Docker images for each service in the
  # matrix. Uses the `image_tag` determined above and pushes both SHA and
  # latest tags to ACR.
  # test comment to kick off build
  # --------------------------------------------------------------------------
  build:
    name: 'Build: ${{ matrix.service }}'
    needs: [determine-services, wait-for-infra]
    if: always() && needs.determine-services.result == 'success' && needs.determine-services.outputs.matrix_empty == 'false' && (needs.wait-for-infra.result == 'success' || needs.wait-for-infra.result == 'skipped')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Map Service
        id: map
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"

          # Default: service directory and image name match the service name
          SERVICE_DIR="services/$SERVICE"
          IMAGE_NAME="$SERVICE"
          BUILD_TYPE="standard"

          # Exceptions: services with shortened image names (must match Terraform resource names)
          if [[ "$SERVICE" == "customerrelationshipsmgt" ]]; then
            IMAGE_NAME="crmgt"
          elif [[ "$SERVICE" == "policyequityandinvoicingmgt" ]]; then
            IMAGE_NAME="peimgt"
          elif [[ "$SERVICE" == "riskratingandunderwriting" ]]; then
            IMAGE_NAME="rru"
          elif [[ "$SERVICE" == "modernizationpatterns" ]]; then
            SERVICE_DIR="platform/modernizationpatterns"
            BUILD_TYPE="modernizationpatterns"
          fi

          echo "service_dir=$SERVICE_DIR" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

      - name: Restore Dependencies
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "modernizationpatterns" ]; then
            dotnet restore "$SERVICE_DIR/Api/chat"
            dotnet restore "$SERVICE_DIR/Api/reindex"
          else
            dotnet restore "$SERVICE_DIR/src/Api"
            dotnet restore "$SERVICE_DIR/src/Endpoint.In"
          fi

      - name: Build .NET Projects
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "modernizationpatterns" ]; then
            dotnet build "$SERVICE_DIR/Api/chat" --configuration Release --no-restore
            dotnet build "$SERVICE_DIR/Api/reindex" --configuration Release --no-restore
          else
            dotnet build "$SERVICE_DIR/src/Api" --configuration Release --no-restore
            dotnet build "$SERVICE_DIR/src/Endpoint.In" --configuration Release --no-restore
          fi

      - name: Run Unit Tests (Pre-Publish Gate)
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"

          if [[ "$BUILD_TYPE" == "modernizationpatterns" ]]; then
            echo "No Unit.Tests project configured for modernizationpatterns; skipping test gate for this service."
            echo "### Unit Test Gate" >> "$GITHUB_STEP_SUMMARY"
            echo "- Service: \`$SERVICE\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Result: skipped (no Unit.Tests project configured)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TEST_PROJECT="services/$SERVICE/test/Unit.Tests/Unit.Tests.csproj"

          if [[ ! -f "$TEST_PROJECT" ]]; then
            echo "Expected unit test project not found: $TEST_PROJECT" >&2
            exit 1
          fi

          dotnet test "$TEST_PROJECT" \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory "TestResults/$SERVICE"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ env.ACR_NAME }}"

      - name: Set Image Tags (FULL SHA + LATEST ONLY)
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${{ steps.map.outputs.image_name }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"
          FULL_SHA="${{ needs.determine-services.outputs.image_tag }}"

          if [ "$BUILD_TYPE" = "modernizationpatterns" ]; then
            # Modernization patterns uses chat-api and reindex instead of api/endpoint
            echo "api_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-chat-api:$FULL_SHA" >> "$GITHUB_OUTPUT"
            echo "api_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-chat-api:latest" >> "$GITHUB_OUTPUT"
            echo "endpoint_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-reindex:$FULL_SHA" >> "$GITHUB_OUTPUT"
            echo "endpoint_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-reindex:latest" >> "$GITHUB_OUTPUT"
          else
            echo "api_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-api:$FULL_SHA" >> "$GITHUB_OUTPUT"
            echo "api_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-api:latest" >> "$GITHUB_OUTPUT"
            echo "endpoint_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:$FULL_SHA" >> "$GITHUB_OUTPUT"
            echo "endpoint_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build API Image
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "modernizationpatterns" ]; then
            # Chat API uses Dockerfile.chat-api at project root
            docker build \
              -f "$SERVICE_DIR/Dockerfile.chat-api" \
              -t "${{ steps.tags.outputs.api_image_sha }}" \
              -t "${{ steps.tags.outputs.api_image_latest }}" \
              .
          else
            docker build \
              -f "$SERVICE_DIR/src/Api/Dockerfile" \
              -t "${{ steps.tags.outputs.api_image_sha }}" \
              -t "${{ steps.tags.outputs.api_image_latest }}" \
              --build-arg SERVICE_NAME="$SERVICE" \
              .
          fi

      - name: Build Endpoint Image
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          BUILD_TYPE="${{ steps.map.outputs.build_type }}"

          if [ "$BUILD_TYPE" = "modernizationpatterns" ]; then
            # Reindex uses Dockerfile.reindex-worker at project root
            docker build \
              -f "$SERVICE_DIR/Dockerfile.reindex-worker" \
              -t "${{ steps.tags.outputs.endpoint_image_sha }}" \
              -t "${{ steps.tags.outputs.endpoint_image_latest }}" \
              .
          else
            docker build \
              -f "$SERVICE_DIR/src/Endpoint.In/Dockerfile" \
              -t "${{ steps.tags.outputs.endpoint_image_sha }}" \
              -t "${{ steps.tags.outputs.endpoint_image_latest }}" \
              --build-arg SERVICE_NAME="$SERVICE" \
              .
          fi

      - name: Push Images to ACR
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.tags.outputs.api_image_sha }}"
          docker push "${{ steps.tags.outputs.api_image_latest }}"
          docker push "${{ steps.tags.outputs.endpoint_image_sha }}"
          docker push "${{ steps.tags.outputs.endpoint_image_latest }}"

      - name: Build Summary
        shell: bash
        run: |
          echo "### ✅ Built & Pushed: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: \`${{ steps.tags.outputs.api_image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- API latest: \`${{ steps.tags.outputs.api_image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Endpoint: \`${{ steps.tags.outputs.endpoint_image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Endpoint latest: \`${{ steps.tags.outputs.endpoint_image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate SBOM for API Image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.api_image_sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 7

  # --------------------------------------------------------------------------
  # Publish CD Metadata
  # Purpose: Produce a small JSON artifact consumed by the CD workflow that
  # contains `image_tag`, `services` and `matrix_empty` so deployments can
  # target only changed services.
  # --------------------------------------------------------------------------
  publish-cd-metadata:
    name: 'Publish CD Metadata'
    needs: [determine-services, build]
    if: always() && needs.determine-services.result == 'success' && (needs.build.result == 'success' || (needs.build.result == 'skipped' && needs.determine-services.outputs.matrix_empty == 'true'))
    runs-on: ubuntu-latest

    steps:
      - name: Create metadata file
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.determine-services.outputs.image_tag }}
          SERVICES: ${{ needs.determine-services.outputs.services }}
          MATRIX_EMPTY: ${{ needs.determine-services.outputs.matrix_empty }}
          TRIGGER_REASON: ${{ needs.determine-services.outputs.trigger_reason }}
        run: |
          set -euo pipefail
          mkdir -p .cd-metadata
          jq -n \
            --arg image_tag "$IMAGE_TAG" \
            --argjson services "$SERVICES" \
            --argjson matrix_empty "$([ "$MATRIX_EMPTY" = 'true' ] && echo 'true' || echo 'false')" \
            --arg trigger_reason "$TRIGGER_REASON" \
            '{"image_tag":$image_tag,"services":$services,"matrix_empty":$matrix_empty,"trigger_reason":$trigger_reason}' \
            > .cd-metadata/deployment-inputs.json
          cat .cd-metadata/deployment-inputs.json

      - name: Upload CD metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-inputs
          path: .cd-metadata/deployment-inputs.json
          retention-days: 7

  # --------------------------------------------------------------------------
  # Summary
  # Purpose: Emit a concise build summary to the step summary for easy
  # inspection in the Actions UI (commit, image tag, services, and result).
  # --------------------------------------------------------------------------
  summary:
    name: 'Build Summary'
    needs: [determine-services, build, publish-cd-metadata]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        shell: bash
        env:
          GH_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ needs.determine-services.outputs.image_tag }}
          SERVICES: ${{ needs.determine-services.outputs.services }}
          MATRIX_EMPTY: ${{ needs.determine-services.outputs.matrix_empty }}
          TRIGGER_REASON: ${{ needs.determine-services.outputs.trigger_reason }}
          BUILD_RESULT: ${{ needs.build.result }}
          METADATA_RESULT: ${{ needs.publish-cd-metadata.result }}
        run: |
          echo "# 🏗️ CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`$GH_SHA\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`$IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`$SERVICES\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Matrix empty:** \`$MATRIX_EMPTY\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger reason:** \`$TRIGGER_REASON\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build result:** \`$BUILD_RESULT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Metadata artifact:** \`$METADATA_RESULT\`" >> "$GITHUB_STEP_SUMMARY"
