# ============================================================================
# CI: Build Services
# Purpose: Build and push Docker images to ACR for services that changed.
# Triggers: push to `main` when services or public contracts change; manual
# dispatch via `workflow_dispatch` supports building selected services.
# Outputs: uploads `cd-inputs` artifact containing `image_tag` and `services`.
# Notes: CI tags images with the full commit SHA and `latest`.
# ============================================================================
name: 'CI: Build Services'

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'platform/RiskInsure.PublicContracts/**'
      - '.github/workflows/ci-build-services.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
        type: string

env:
  REGISTRY: 'riskinsuredevacr.azurecr.io'
  ACR_NAME: 'riskinsuredevacr'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-build-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Determine Services
  # Purpose: Inspect the commit to decide which services changed and set
  # outputs: `services`, `matrix_empty`, and `image_tag` for downstream jobs.
  # --------------------------------------------------------------------------
  determine-services:
    name: 'Determine Services'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
      matrix_empty: ${{ steps.determine.outputs.matrix_empty }}
      image_tag: ${{ steps.determine.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Changed Services
        id: determine
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES='["billing","customer","customerrelationshipsmgt","fundstransfermgt","policy","policylifecyclemgt","policyequityandinvoicingmgt","ratingandunderwriting","riskratingandunderwriting"]'
          echo "image_tag=${{ github.sha }}" 
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          # Handle edge case where BEFORE is all zeros (first push / unusual push scenario)
          if [[ "$BEFORE" =~ ^0+$ ]]; then
            changed_files=$(git show --pretty="" --name-only "$SHA" || true)
          else
            changed_files=$(git diff --name-only "$BEFORE" "$SHA" || true)
          fi

          echo "### Changed files (CI debug)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$changed_files" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          if [[ -z "$changed_files" ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Workflow change -> build all
          if echo "$changed_files" | grep -q '^\.github/workflows/ci-build-services\.yml$'; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Shared contracts change -> build all
          if echo "$changed_files" | grep -q '^platform/RiskInsure\.PublicContracts/'; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_services=()
          for service in billing customer customerrelationshipsmgt fundstransfermgt policy policylifecyclemgt policyequityandinvoicingmgt ratingandunderwriting riskratingandunderwriting; do
            if echo "$changed_files" | grep -q "^services/$service/"; then
              changed_services+=("\"$service\"")
            fi
          done

          if [[ ${#changed_services[@]} -eq 0 ]]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
          else
            services_json="[$(IFS=,; echo "${changed_services[*]}")]"
            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        shell: bash
        run: |
          echo "### 🏗️ Services to Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`${{ steps.determine.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`${{ steps.determine.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"

  # --------------------------------------------------------------------------
  # Build
  # Purpose: Build, tag, and push Docker images for each service in the
  # matrix. Uses the `image_tag` determined above and pushes both SHA and
  # latest tags to ACR.
  # --------------------------------------------------------------------------
  build:
    name: 'Build: ${{ matrix.service }}'
    needs: determine-services
    if: needs.determine-services.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Map Service
        id: map
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"

          # Default: service directory and image name match the service name
          SERVICE_DIR="services/$SERVICE"
          IMAGE_NAME="$SERVICE"

          # Exceptions: services with shortened image names (must match Terraform resource names)
          if [[ "$SERVICE" == "customerrelationshipsmgt" ]]; then
            IMAGE_NAME="crmgt"
          elif [[ "$SERVICE" == "policyequityandinvoicingmgt" ]]; then
            IMAGE_NAME="peimgt"
          elif [[ "$SERVICE" == "riskratingandunderwriting" ]]; then
            IMAGE_NAME="rru"
          fi

          echo "service_dir=$SERVICE_DIR" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Restore Dependencies
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          dotnet restore "$SERVICE_DIR/src/Api"
          dotnet restore "$SERVICE_DIR/src/Endpoint.In"

      - name: Build .NET Projects
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"
          dotnet build "$SERVICE_DIR/src/Api" --configuration Release --no-restore
          dotnet build "$SERVICE_DIR/src/Endpoint.In" --configuration Release --no-restore

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ env.ACR_NAME }}"

      - name: Set Image Tags (FULL SHA + LATEST ONLY)
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${{ steps.map.outputs.image_name }}"
          FULL_SHA="${{ needs.determine-services.outputs.image_tag }}"

          echo "api_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-api:$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-api:latest" >> "$GITHUB_OUTPUT"

          echo "endpoint_image_sha=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "endpoint_image_latest=${{ env.REGISTRY }}/${IMAGE_NAME}-endpoint:latest" >> "$GITHUB_OUTPUT"

      - name: Build API Image
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"

          docker build \
            -f "$SERVICE_DIR/src/Api/Dockerfile" \
            -t "${{ steps.tags.outputs.api_image_sha }}" \
            -t "${{ steps.tags.outputs.api_image_latest }}" \
            --build-arg SERVICE_NAME="$SERVICE" \
            .

      - name: Build Endpoint Image
        shell: bash
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.map.outputs.service_dir }}"

          docker build \
            -f "$SERVICE_DIR/src/Endpoint.In/Dockerfile" \
            -t "${{ steps.tags.outputs.endpoint_image_sha }}" \
            -t "${{ steps.tags.outputs.endpoint_image_latest }}" \
            --build-arg SERVICE_NAME="$SERVICE" \
            .

      - name: Push Images to ACR
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.tags.outputs.api_image_sha }}"
          docker push "${{ steps.tags.outputs.api_image_latest }}"
          docker push "${{ steps.tags.outputs.endpoint_image_sha }}"
          docker push "${{ steps.tags.outputs.endpoint_image_latest }}"

      - name: Build Summary
        shell: bash
        run: |
          echo "### ✅ Built & Pushed: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: \`${{ steps.tags.outputs.api_image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- API latest: \`${{ steps.tags.outputs.api_image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Endpoint: \`${{ steps.tags.outputs.endpoint_image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Endpoint latest: \`${{ steps.tags.outputs.endpoint_image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate SBOM for API Image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.api_image_sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 7

  # --------------------------------------------------------------------------
  # Publish CD Metadata
  # Purpose: Produce a small JSON artifact consumed by the CD workflow that
  # contains `image_tag`, `services` and `matrix_empty` so deployments can
  # target only changed services.
  # --------------------------------------------------------------------------
  publish-cd-metadata:
    name: 'Publish CD Metadata'
    needs: [determine-services, build]
    if: always() && needs.determine-services.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Create metadata file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cd-metadata

          cat > .cd-metadata/deployment-inputs.json <<EOF
          {
            "image_tag": "${{ needs.determine-services.outputs.image_tag }}",
            "services": ${{ needs.determine-services.outputs.services }},
            "matrix_empty": ${{ needs.determine-services.outputs.matrix_empty }}
          }
          EOF

          cat .cd-metadata/deployment-inputs.json

      - name: Upload CD metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: cd-inputs
          path: .cd-metadata/deployment-inputs.json
          retention-days: 7

  # --------------------------------------------------------------------------
  # Summary
  # Purpose: Emit a concise build summary to the step summary for easy
  # inspection in the Actions UI (commit, image tag, services, and result).
  # --------------------------------------------------------------------------
  summary:
    name: 'Build Summary'
    needs: [determine-services, build, publish-cd-metadata]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🏗️ CI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** \`${{ needs.determine-services.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`${{ needs.determine-services.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Build result:** \`${{ needs.build.result }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Metadata artifact:** \`${{ needs.publish-cd-metadata.result }}\`" >> "$GITHUB_STEP_SUMMARY"