name: 'CI: Build Services'

# ============================================================================
# Purpose: Build and push Docker images to ACR (independent of deployment)
# Triggers: Push to main with service changes
# Duration: ~10 minutes
# Blocks: No (async, deployments can use these images)
# Use Case: Pre-build images for faster deployments
# ============================================================================

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - '.github/workflows/new/ci-build-services.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated or "all")'
        required: true
        default: 'all'
      tag:
        description: 'Additional tag (e.g., "hotfix", "v1.2.3")'
        type: string
        required: false

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: 'riskinsureacr.azurecr.io'

permissions:
  contents: read
  id-token: write

concurrency:
  group: riskinsure-build-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Determine which services changed
  # ==========================================================================
  determine-services:
    name: 'Determine Services'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
      matrix_empty: ${{ steps.determine.outputs.matrix_empty }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Determine Changed Services
        id: determine
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Detect changed services from git diff
            changed_services=()
            
            for service in billing customer fundstransfermgt policy ratingandunderwriting; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^services/$service/"; then
                changed_services+=("\"$service\"")
              fi
            done
            
            if [ ${#changed_services[@]} -eq 0 ]; then
              echo "No service changes detected"
              echo "services=[]" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
            else
              services_json="[$(IFS=,; echo "${changed_services[*]}")]"
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      
      - name: Summary
        shell: bash
        run: |
          echo "### 🏗️ Services to Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`${{ steps.determine.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build:
    name: 'Build: ${{ matrix.service }}'
    needs: determine-services
    if: needs.determine-services.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get ACR Name
        id: acr
        shell: bash
        run: |
          RG="CAIS-010-RiskInsure"
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "📦 ACR: $ACR_NAME"
      
      - name: ACR Login
        run: |
          az acr login --name ${{ steps.acr.outputs.acr_name }}
      
      - name: Restore Dependencies
        working-directory: services/${{ matrix.service }}/src
        run: dotnet restore
      
      - name: Build Solution
        working-directory: services/${{ matrix.service }}/src
        run: dotnet build --no-restore --configuration Release
      
      - name: Build Docker Image
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_BASE="${{ env.REGISTRY }}/$SERVICE"
          IMAGE_SHA="$IMAGE_BASE:${{ github.sha }}"
          IMAGE_SHORT="$IMAGE_BASE:${GITHUB_SHA:0:7}"
          IMAGE_LATEST="$IMAGE_BASE:latest"
          
          echo "🏗️ Building $SERVICE..."
          
          # Find Dockerfile
          if [ -f "services/$SERVICE/src/Dockerfile" ]; then
            DOCKERFILE="services/$SERVICE/src/Dockerfile"
            CONTEXT="services/$SERVICE/src"
          elif [ -f "services/$SERVICE/Dockerfile" ]; then
            DOCKERFILE="services/$SERVICE/Dockerfile"
            CONTEXT="services/$SERVICE"
          else
            echo "❌ Dockerfile not found for $SERVICE"
            exit 1
          fi
          
          echo "📄 Dockerfile: $DOCKERFILE"
          echo "📁 Context: $CONTEXT"
          
          # Build with multiple tags
          docker build \
            -f "$DOCKERFILE" \
            -t "$IMAGE_SHA" \
            -t "$IMAGE_SHORT" \
            -t "$IMAGE_LATEST" \
            "$CONTEXT"
          
          echo "✅ Build complete"
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_ENV"
          echo "image_short=$IMAGE_SHORT" >> "$GITHUB_ENV"
          echo "image_latest=$IMAGE_LATEST" >> "$GITHUB_ENV"
      
      - name: Add Custom Tag (Optional)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          IMAGE_CUSTOM="${{ env.REGISTRY }}/$SERVICE:${{ github.event.inputs.tag }}"
          docker tag "${{ env.image_sha }}" "$IMAGE_CUSTOM"
          echo "image_custom=$IMAGE_CUSTOM" >> "$GITHUB_ENV"
      
      - name: Push Images to ACR
        shell: bash
        run: |
          echo "📤 Pushing images to ACR..."
          
          docker push "${{ env.image_sha }}"
          echo "✅ Pushed: ${{ env.image_sha }}"
          
          docker push "${{ env.image_short }}"
          echo "✅ Pushed: ${{ env.image_short }}"
          
          docker push "${{ env.image_latest }}"
          echo "✅ Pushed: ${{ env.image_latest }}"
          
          if [[ -n "${{ env.image_custom }}" ]]; then
            docker push "${{ env.image_custom }}"
            echo "✅ Pushed: ${{ env.image_custom }}"
          fi
      
      - name: Image Manifest
        shell: bash
        run: |
          echo "### 📦 ${{ matrix.service }} Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Image |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full SHA | \`${{ env.image_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Short SHA | \`${{ env.image_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | \`${{ env.image_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ -n "${{ env.image_custom }}" ]]; then
            echo "| Custom | \`${{ env.image_custom }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - name: Generate SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.image_sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

  # ==========================================================================
  # Vulnerability Scanning (Optional but Recommended)
  # ==========================================================================
  scan:
    name: 'Scan: ${{ matrix.service }}'
    needs: [determine-services, build]
    if: needs.determine-services.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      security-events: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get ACR Name
        id: acr
        shell: bash
        run: |
          RG="CAIS-010-RiskInsure"
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
      
      - name: ACR Login
        run: |
          az acr login --name ${{ steps.acr.outputs.acr_name }}
      
      - name: Pull Image
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}"
          docker pull "$IMAGE"
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'container-${{ matrix.service }}'
      
      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results-${{ matrix.service }}
          path: trivy-results-${{ matrix.service }}.sarif
          retention-days: 30

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: 'Build Summary'
    needs: [determine-services, build, scan]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🏗️ Build Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Event:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📋 Job Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Determine Services | ${{ needs.determine-services.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | ${{ needs.scan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.determine-services.outputs.matrix_empty }}" == "true" ]]; then
            echo "ℹ️ No services to build (no changes detected)" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ All images built and pushed successfully" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Services:** ${{ needs.determine-services.outputs.services }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Registry:** \`${{ env.REGISTRY }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 🔐 Security Scan" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${{ needs.scan.result }}" == "success" ]]; then
              echo "✅ Vulnerability scan completed. Check Security tab for results." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Vulnerability scan failed or skipped." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "❌ Some builds failed. Check logs for details." >> "$GITHUB_STEP_SUMMARY"
          fi
