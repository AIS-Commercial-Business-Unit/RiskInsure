name: 'CD: Services Dev'

# ==============================================================================
# Purpose: Auto-deploy services to dev after CI builds images
# Triggers:
#   - After CI: Build Services completes successfully
#   - Manual workflow_dispatch (deploy specific services)
# Duration: ~8-12 minutes
# CRITICAL:
#   - workflow_run uses CI artifact metadata for image tag and service scope
#   - workflow_dispatch requires an explicit immutable image tag
# ==============================================================================

on:
  # IMPORTANT: Do NOT run on push. CI runs on push; CD runs after CI success.
  workflow_run:
    workflows:
      - 'CI: Build Services'
    types: [ completed ]
    branches: [ main ]

  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated or "all")'
        required: true
        default: 'all'
        type: string
      image_tag:
        description: 'Exact image tag / commit SHA to deploy'
        required: true
        type: string

env:
  TERRAFORM_VERSION: '1.11.4'
  ENVIRONMENT: 'dev'
  REGISTRY: 'riskinsuredevacr.azurecr.io'
  ACR_NAME: 'riskinsuredevacr'
  RG: 'CAIS-010-RiskInsure'
  ENABLE_IMAGE_EXISTENCE_CHECK: 'true'

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: riskinsure-services-dev
  cancel-in-progress: false

jobs:
  # ==============================================================================
  # Determine which services to deploy and which image tag to use
  # CRITICAL:
  #   - workflow_run: consume CI metadata artifact
  #   - workflow_dispatch: use explicit image_tag input
  # ==============================================================================
  determine:
    name: 'Determine Services + Image Tag'
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.out.outputs.services }}
      matrix_empty: ${{ steps.out.outputs.matrix_empty }}
      image_tag: ${{ steps.out.outputs.image_tag }}
      trigger_reason: ${{ steps.out.outputs.trigger_reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CI deployment metadata artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v8
        with:
          name: cd-inputs
          path: .cd-inputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Decide services + image_tag
        id: out
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
        run: |
          set -euo pipefail

          source .github/scripts/managed-services.sh

          if [[ "$GH_EVENT_NAME" == "workflow_run" ]]; then
            METADATA_FILE=".cd-inputs/deployment-inputs.json"

            if [[ ! -s "$METADATA_FILE" ]]; then
              echo "Missing or empty CI metadata artifact at $METADATA_FILE" >&2
              exit 1
            fi

            if ! jq -e '
              type == "object" and
              (.image_tag | type == "string" and length > 0) and
              (.services | type == "array") and
              (.matrix_empty | type == "boolean")
            ' "$METADATA_FILE" >/dev/null; then
              echo "Malformed deployment-inputs.json in CI metadata artifact." >&2
              cat "$METADATA_FILE"
              exit 1
            fi

            IMAGE_TAG=$(jq -r '.image_tag' "$METADATA_FILE")
            SERVICES_JSON=$(jq -c '.services' "$METADATA_FILE")
            MATRIX_EMPTY=$(jq -r '.matrix_empty' "$METADATA_FILE")
            TRIGGER_REASON=$(jq -r '.trigger_reason // "ci-artifact"' "$METADATA_FILE")

            # Do not auto-deploy from workflow_run when upstream CI was manually dispatched.
            if [[ "$TRIGGER_REASON" == manual-* ]]; then
              echo "Skipping automatic CD for manual CI workflow_run (trigger_reason=$TRIGGER_REASON)."
              echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
              echo "services=[]" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
              echo "trigger_reason=workflow-run-manual-ci-suppressed" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            validate_services_json "$SERVICES_JSON"
            validate_matrix_consistency "$SERVICES_JSON" "$MATRIX_EMPTY"

            echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
            echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=$MATRIX_EMPTY" >> "$GITHUB_OUTPUT"
            echo "trigger_reason=$TRIGGER_REASON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IMAGE_TAG_RAW="$INPUT_IMAGE_TAG"
          IMAGE_TAG="$(echo "$IMAGE_TAG_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [[ -z "$IMAGE_TAG" ]]; then
            echo "workflow_dispatch input image_tag is required." >&2
            exit 1
          fi

          # Keep manual deployments deterministic: disallow mutable tag aliases.
          if [[ "$IMAGE_TAG" == "latest" ]]; then
            echo "The image_tag input cannot be 'latest'. Use an immutable tag (for example, a full commit SHA)." >&2
            exit 1
          fi

          if ! [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid image_tag format: $IMAGE_TAG" >&2
            exit 1
          fi

          services_input="$INPUT_SERVICES"
          normalized_input=$(echo "$services_input" | tr '[:upper:]' '[:lower:]')
          SERVICES_JSON="$(parse_dispatch_services_input "$services_input")"
          MATRIX_EMPTY=$(echo "$SERVICES_JSON" | jq -r 'if length == 0 then "true" else "false" end')

          if [[ "$normalized_input" == "all" ]]; then
            TRIGGER_REASON="manual-all-services-explicit-image-tag"
          else
            TRIGGER_REASON="manual-selected-services-explicit-image-tag"
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "matrix_empty=$MATRIX_EMPTY" >> "$GITHUB_OUTPUT"
          echo "trigger_reason=$TRIGGER_REASON" >> "$GITHUB_OUTPUT"

      - name: Summary
        shell: bash
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          WF_RUN_NAME: ${{ github.event.workflow_run.name }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          OUT_IMAGE_TAG: ${{ steps.out.outputs.image_tag }}
          OUT_SERVICES: ${{ steps.out.outputs.services }}
          OUT_MATRIX_EMPTY: ${{ steps.out.outputs.matrix_empty }}
          OUT_TRIGGER_REASON: ${{ steps.out.outputs.trigger_reason }}
        run: |
          echo "### 🚀 CD Deployment Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`$GH_EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$GH_EVENT_NAME" == "workflow_run" ]]; then
            echo "**Upstream workflow:** \`$WF_RUN_NAME\`" >> "$GITHUB_STEP_SUMMARY"
            echo "**Upstream status:** \`$WF_RUN_CONCLUSION\`" >> "$GITHUB_STEP_SUMMARY"
            echo "**Upstream run-id:** \`$WF_RUN_ID\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**image_tag:** \`$OUT_IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**services:** \`$OUT_SERVICES\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**matrix_empty:** \`$OUT_MATRIX_EMPTY\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**trigger_reason:** \`$OUT_TRIGGER_REASON\`" >> "$GITHUB_STEP_SUMMARY"

  # ==============================================================================
  # CRITICAL: Verify infrastructure exists before deploying services
  # This prevents deployment failures due to missing resources
  # ==============================================================================
  verify-infra:
    name: 'Verify Infrastructure'
    needs: determine
    if: needs.determine.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      resource_group: ${{ steps.verify.outputs.resource_group }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify infrastructure pre-flight
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ env.RG }}"
          ENVIRONMENT="${{ env.ENVIRONMENT }}"
          CAE_NAME="riskinsure-${ENVIRONMENT}-env"
          UAMI_NAME="riskinsure-${ENVIRONMENT}-app-mi"

          # 1. Resource group must exist — all resources are scoped to it
          if ! az group show --name "$RG" >/dev/null 2>&1; then
            echo "::error::Resource group not found: $RG. Run cd-infra-dev.yml (foundation layer) first." >&2
            exit 1
          fi

          # 2. Container Apps Environment must exist — every Container App binds to it at create time
          if ! az containerapp env show --name "$CAE_NAME" --resource-group "$RG" >/dev/null 2>&1; then
            echo "::error::Container Apps Environment '$CAE_NAME' not found in '$RG'. Run cd-infra-dev.yml (services layer) first." >&2
            exit 1
          fi

          # 3. UAMI must exist — every Container App references it for managed identity
          if ! az identity show --name "$UAMI_NAME" --resource-group "$RG" >/dev/null 2>&1; then
            echo "::error::UAMI '$UAMI_NAME' not found in '$RG'. Run cd-infra-dev.yml (shared-services layer) first." >&2
            exit 1
          fi

          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "Infrastructure pre-flight passed: RG=$RG | CAE=$CAE_NAME | UAMI=$UAMI_NAME"

  # ==============================================================================
  # Optional pre-deploy guard to ensure CI-built image tags exist in ACR
  # ============================================================================== 
  verify-images:
    name: 'Verify Built Images Exist'
    needs: determine
    if: needs.determine.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Azure Login
        if: env.ENABLE_IMAGE_EXISTENCE_CHECK == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify image tags exist in ACR
        shell: bash
        env:
          SERVICES: ${{ needs.determine.outputs.services }}
          IMAGE_TAG: ${{ needs.determine.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ "${{ env.ENABLE_IMAGE_EXISTENCE_CHECK }}" != "true" ]]; then
            echo "Image existence check disabled by ENABLE_IMAGE_EXISTENCE_CHECK."
            exit 0
          fi

          map_image_name() {
            case "$1" in
              customerrelationshipsmgt) echo "crmgt" ;;
              policyequityandinvoicingmgt) echo "peimgt" ;;
              riskratingandunderwriting) echo "rru" ;;
              *) echo "$1" ;;
            esac
          }

          missing_images=()

          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            image_name=$(map_image_name "$service")

            if [[ "$service" == "modernizationpatterns" ]]; then
              repositories=("${image_name}-chat-api" "${image_name}-reindex")
            else
              repositories=("${image_name}-api" "${image_name}-endpoint")
            fi

            for repository in "${repositories[@]}"; do
              tag_count=$(az acr repository show-tags \
                --name "${{ env.ACR_NAME }}" \
                --repository "$repository" \
                --query "[?@=='$IMAGE_TAG'] | length(@)" \
                -o tsv 2>/dev/null || echo "0")

              if [[ "$tag_count" != "1" ]]; then
                missing_images+=("${repository}:$IMAGE_TAG")
              fi
            done
          done

          if [[ ${#missing_images[@]} -gt 0 ]]; then
            echo "Missing image tags in ACR:" >&2
            printf ' - %s\n' "${missing_images[@]}" >&2
            exit 1
          fi

          echo "All selected image tags exist in ACR."

  # ==============================================================================
  # Deploy Container Apps using Terraform with targeted deployments
  # Uses image_tag from determine job to deploy exact images CI built
  # ==============================================================================
  deploy:
    name: 'Deploy Container Apps'
    needs: [determine, verify-infra, verify-images]
    if: needs.determine.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: platform/infra/services

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Validate
        run: terraform validate

      - name: Build Terraform Targets
        id: targets
        shell: bash
        env:
          SERVICES: ${{ needs.determine.outputs.services }}
        run: |
          set -euo pipefail

          TARGETS=""

          for s in $(echo "$SERVICES" | jq -r '.[]'); do
            # Map service name to Terraform resource name
            case "$s" in
              fundstransfermgt)
                TARGETS="$TARGETS -target=azurerm_container_app.fundstransfermgt_api"
                TARGETS="$TARGETS -target=azurerm_container_app.fundstransfermgt_endpoint"
                ;;
              policylifecyclemgt)
                TARGETS="$TARGETS -target=azurerm_container_app.policylifecyclemgt_api"
                TARGETS="$TARGETS -target=azurerm_container_app.policylifecyclemgt_endpoint"
                ;;
              policyequityandinvoicingmgt)
                TARGETS="$TARGETS -target=azurerm_container_app.peimgt_api"
                TARGETS="$TARGETS -target=azurerm_container_app.peimgt_endpoint"
                ;;
              customerrelationshipsmgt)
                TARGETS="$TARGETS -target=azurerm_container_app.crmgt_api"
                TARGETS="$TARGETS -target=azurerm_container_app.crmgt_endpoint"
                ;;
              riskratingandunderwriting)
                TARGETS="$TARGETS -target=azurerm_container_app.rru_api"
                TARGETS="$TARGETS -target=azurerm_container_app.rru_endpoint"
                ;;
              modernizationpatterns)
                TARGETS="$TARGETS -target=azurerm_container_app.modernizationpatterns_chat_api"
                TARGETS="$TARGETS -target=azurerm_container_app.modernizationpatterns_reindex_worker"
                ;;
              *)
                echo "Unsupported service in deployment scope: $s" >&2
                exit 1
                ;;
            esac
          done

          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "Targets: $TARGETS"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="image_tag=$IMAGE_TAG" \
            $TF_TARGETS \
            -out=tfplan \
            -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          IMAGE_TAG: ${{ needs.determine.outputs.image_tag }}
          TF_TARGETS: ${{ steps.targets.outputs.targets }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ==============================================================================
  # Summary
  # ==============================================================================
  summary:
    name: 'Deployment Summary'
    needs: [determine, verify-infra, verify-images, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.determine.outputs.image_tag }}
          SERVICES: ${{ needs.determine.outputs.services }}
          MATRIX_EMPTY: ${{ needs.determine.outputs.matrix_empty }}
          TRIGGER_REASON: ${{ needs.determine.outputs.trigger_reason }}
          DETERMINE_RESULT: ${{ needs.determine.result }}
          VERIFY_INFRA_RESULT: ${{ needs.verify-infra.result }}
          VERIFY_IMAGES_RESULT: ${{ needs.verify-images.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          echo "# 🚀 CD Services Dev Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**image_tag:** \`$IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**services:** \`$SERVICES\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**matrix_empty:** \`$MATRIX_EMPTY\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**trigger_reason:** \`$TRIGGER_REASON\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Determine | $DETERMINE_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify Infra | $VERIFY_INFRA_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify Images | $VERIFY_IMAGES_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy | $DEPLOY_RESULT |" >> "$GITHUB_STEP_SUMMARY"
