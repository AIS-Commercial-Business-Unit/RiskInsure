name: 'CD: Services Dev'

# ============================================================================
# Purpose: Auto-deploy service changes to dev environment
# Triggers: Push to main with service changes OR after infrastructure deployment
# Duration: ~18 minutes
# Blocks: No (runs after merge)
# CRITICAL: Solves integration test timing by ensuring infrastructure exists first
# ============================================================================

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - '.github/workflows/cd-services-dev.yml'
  workflow_run:
    workflows: ['CD: Infrastructure Dev']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated or "all")'
        required: true
        default: 'all'
      skip_tests:
        description: 'Skip pre-deployment checks'
        type: boolean
        required: false
        default: false

env:
  TERRAFORM_VERSION: '1.11.4'
  DOTNET_VERSION: '10.0.x'
  ENVIRONMENT: 'dev'
  REGISTRY: 'riskinsureacr.azurecr.io'

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: riskinsure-services-dev
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Determine which services changed (or all if workflow_dispatch/workflow_run)
  # ==========================================================================
  determine-services:
    name: 'Determine Services'
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
      deploy_all: ${{ steps.determine.outputs.deploy_all }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Determine Changed Services
        id: determine
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
              echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            else
              # Convert comma-separated to JSON array
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "deploy_all=false" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Infrastructure changed, deploy all services
            echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
          else
            # Detect changed services from git diff
            changed_services=()
            
            for service in billing customer fundstransfermgt policy ratingandunderwriting; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^services/$service/"; then
                changed_services+=("\"$service\"")
              fi
            done
            
            if [ ${#changed_services[@]} -eq 0 ]; then
              echo "No service changes detected"
              echo "services=[]" >> "$GITHUB_OUTPUT"
              echo "deploy_all=false" >> "$GITHUB_OUTPUT"
            else
              services_json="[$(IFS=,; echo "${changed_services[*]}")]"
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
              echo "deploy_all=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      
      - name: Summary
        shell: bash
        run: |
          echo "### 📦 Services to Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** \`${{ steps.determine.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deploy All:** \`${{ steps.determine.outputs.deploy_all }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # CRITICAL: Verify infrastructure exists before deploying services
  # This prevents the integration test timing bug
  # ==========================================================================
  verify-infrastructure:
    name: 'Verify Infrastructure'
    needs: determine-services
    if: needs.determine-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    environment: dev
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      acr_name: ${{ steps.verify.outputs.acr_name }}
      resource_group: ${{ steps.verify.outputs.resource_group }}
      uami_id: ${{ steps.verify.outputs.uami_id }}
      servicebus_namespace: ${{ steps.verify.outputs.servicebus_namespace }}
      cosmosdb_account: ${{ steps.verify.outputs.cosmosdb_account }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Verify Infrastructure Resources
        id: verify
        shell: bash
        run: |
          echo "🔍 Verifying infrastructure resources..."
          
          # Expected resource group
          RG="CAIS-010-RiskInsure"
          
          # Verify Resource Group
          if ! az group show --name "$RG" &>/dev/null; then
            echo "❌ Resource group $RG not found"
            exit 1
          fi
          echo "✅ Resource Group: $RG"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          
          # Verify ACR
          ACR_NAME=$(az acr list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$ACR_NAME" ]; then
            echo "❌ ACR not found in $RG"
            exit 1
          fi
          echo "✅ ACR: $ACR_NAME"
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          
          # Verify UAMI (using exact naming convention from Terraform)
          UAMI_NAME="riskinsure-${ENVIRONMENT}-app-mi"
          UAMI_ID=$(az identity show -n "$UAMI_NAME" -g "$RG" --query "id" -o tsv 2>/dev/null || echo "")
          if [ -z "$UAMI_ID" ] || [ "$UAMI_ID" = "null" ]; then
            echo "❌ User-Assigned Managed Identity not found: $UAMI_NAME"
            echo "❌ Searched in: $RG"
            exit 1
          fi
          echo "✅ UAMI: $UAMI_NAME ($UAMI_ID)"
          echo "uami_id=$UAMI_ID" >> "$GITHUB_OUTPUT"
          
          # Verify Service Bus
          SB_NAMESPACE=$(az servicebus namespace list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$SB_NAMESPACE" ]; then
            echo "❌ Service Bus namespace not found"
            exit 1
          fi
          echo "✅ Service Bus: $SB_NAMESPACE"
          echo "servicebus_namespace=$SB_NAMESPACE" >> "$GITHUB_OUTPUT"
          
          # Verify Cosmos DB
          COSMOS_ACCOUNT=$(az cosmosdb list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$COSMOS_ACCOUNT" ]; then
            echo "❌ Cosmos DB account not found"
            exit 1
          fi
          echo "✅ Cosmos DB: $COSMOS_ACCOUNT"
          echo "cosmosdb_account=$COSMOS_ACCOUNT" >> "$GITHUB_OUTPUT"
          
          echo ""
          echo "🎉 All infrastructure resources verified!"

  # ==========================================================================
  # Build and Push Docker Images
  # ==========================================================================
  build-images:
    name: 'Build: ${{ matrix.service }}'
    needs: [determine-services, verify-infrastructure]
    if: needs.determine-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: ACR Login
        shell: bash
        run: |
          ACR_NAME="${{ needs.verify-infrastructure.outputs.acr_name }}"
          echo "🔐 Logging into ACR: $ACR_NAME"
          az acr login --name "$ACR_NAME"
      
      - name: Determine service path and project prefix
        id: paths
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          
          case "$SERVICE" in
            billing)
              SERVICE_DIR="services/billing"
              PROJECT_PREFIX="RiskInsure.Billing"
              IMAGE_NAME="billing"
              ;;
            customer)
              SERVICE_DIR="services/customer"
              PROJECT_PREFIX="RiskInsure.Customer"
              IMAGE_NAME="customer"
              ;;
            fundstransfermgt)
              SERVICE_DIR="services/fundstransfermgt"
              PROJECT_PREFIX="RiskInsure.FundsTransferMgt"
              IMAGE_NAME="fundstransfermgt"
              ;;
            policy)
              SERVICE_DIR="services/policy"
              PROJECT_PREFIX="RiskInsure.Policy"
              IMAGE_NAME="policy"
              ;;
            ratingunderwriting)
              SERVICE_DIR="services/ratingandunderwriting"
              PROJECT_PREFIX="RiskInsure.RatingAndUnderwriting"
              IMAGE_NAME="ratingandunderwriting"
              ;;
            *)
              echo "❌ Unknown service: $SERVICE"
              exit 1
              ;;
          esac
          
          echo "service_dir=$SERVICE_DIR" >> "$GITHUB_OUTPUT"
          echo "project_prefix=$PROJECT_PREFIX" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ Mapped $SERVICE → $SERVICE_DIR ($PROJECT_PREFIX)"
      
      - name: Build API Image
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.paths.outputs.service_dir }}"
          PROJECT_PREFIX="${{ steps.paths.outputs.project_prefix }}"
          IMAGE_NAME="${{ steps.paths.outputs.image_name }}"
          ACR_SERVER="${{ env.REGISTRY }}"
          IMAGE_TAG="${{ github.sha }}"
          
          API_IMAGE="$ACR_SERVER/$IMAGE_NAME-api:$IMAGE_TAG"
          
          echo "🔨 Building API image: $API_IMAGE"
          echo "   Dockerfile: $SERVICE_DIR/src/Api/Dockerfile"
          
          docker build \
            -t "$API_IMAGE" \
            -f "$SERVICE_DIR/src/Api/Dockerfile" \
            --build-arg SERVICE_NAME=$SERVICE \
            .
          
          docker push "$API_IMAGE"
          echo "✅ API image pushed: $API_IMAGE"
      
      - name: Build Endpoint.In Image
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          SERVICE_DIR="${{ steps.paths.outputs.service_dir }}"
          PROJECT_PREFIX="${{ steps.paths.outputs.project_prefix }}"
          IMAGE_NAME="${{ steps.paths.outputs.image_name }}"
          ACR_SERVER="${{ env.REGISTRY }}"
          IMAGE_TAG="${{ github.sha }}"
          
          ENDPOINT_IMAGE="$ACR_SERVER/$IMAGE_NAME-endpoint:$IMAGE_TAG"
          
          echo "🔨 Building Endpoint.In image: $ENDPOINT_IMAGE"
          echo "   Dockerfile: $SERVICE_DIR/src/Endpoint.In/Dockerfile"
          --build-arg SERVICE_NAME=$SERVICE \
            .
          
          docker push "$ENDPOINT_IMAGE"
          echo "✅ Endpoint.In image pushed: $ENDPOINT_IMAGE"

  # ==========================================================================
  # Deploy Container Apps
  # ==========================================================================
  deploy-apps:
    name: 'Deploy: ${{ matrix.service }}'
    needs: [determine-services, verify-infrastructure, build-images]
    if: needs.determine-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    environment: dev
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    defaults:
      run:
        shell: bash
        working-directory: platform/infra/services
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      
      - name: Terraform Init
        run: terraform init -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: Build Terraform Targets
        id: targets
        shell: bash
        run: |
          SERVICES='${{ needs.determine-services.outputs.services }}'
          TARGETS=""
          
          echo "📦 Building Terraform targets for services: $SERVICES"
          
          for service in $(echo "$SERVICES" | jq -r '.[]'); do
            # Map service names to Terraform resource names
            case "$service" in
              ratingunderwriting)
                tf_service_name="ratingandunderwriting"
                ;;
              *)
                tf_service_name="$service"
                ;;
            esac
            
            echo "  - $service → azurerm_container_app.${tf_service_name}_api"
            echo "  - $service → azurerm_container_app.${tf_service_name}_endpoint"
            
            TARGETS="$TARGETS -target=azurerm_container_app.${tf_service_name}_api"
            TARGETS="$TARGETS -target=azurerm_container_app.${tf_service_name}_endpoint"
          done
          
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "✅ Terraform targets: $TARGETS"
      
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="image_tag=${{ github.sha }}" \
            ${{ steps.targets.outputs.targets }} \
            -out=tfplan \
            -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ==========================================================================
  # Health Check (verify all services are running)
  # ==========================================================================
  health-check:
    name: 'Health Check: ${{ matrix.service }}'
    needs: [determine-services, verify-infrastructure, deploy-apps]
    if: needs.determine-services.outputs.services != '[]'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Determine Container App Names
        id: app_names
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          RG="${{ needs.verify-infrastructure.outputs.resource_group }}"
          
          case "$SERVICE" in
            ratingunderwriting)
              API_APP_NAME="ratingandunderwriting-api"
              ENDPOINT_APP_NAME="ratingandunderwriting-endpoint"
              ;;
            *)
              API_APP_NAME="${SERVICE}-api"
              ENDPOINT_APP_NAME="${SERVICE}-endpoint"
              ;;
          esac
          
          echo "api_app_name=$API_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "endpoint_app_name=$ENDPOINT_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "✅ Container Apps: $API_APP_NAME, $ENDPOINT_APP_NAME"
      
      - name: Check API Container App
        shell: bash
        run: |
          RG="${{ steps.app_names.outputs.resource_group }}"
          APP_NAME="${{ steps.app_names.outputs.api_app_name }}"
          
          echo "🔍 Checking API: $APP_NAME (RG: $RG)"
          
          STATUS=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "properties.runningStatus" \
            -o tsv 2>/dev/null || echo "NotFound")
          
          echo "Status: $STATUS"
          
          if [ "$STATUS" = "Running" ]; then
            echo "✅ $APP_NAME is running"
          else
            echo "⚠️ $APP_NAME status: $STATUS"
          fi
      
      - name: Check Endpoint.In Container App
        shell: bash
        run: |
          RG="${{ steps.app_names.outputs.resource_group }}"
          APP_NAME="${{ steps.app_names.outputs.endpoint_app_name }}"
          
          echo "🔍 Checking Endpoint: $APP_NAME (RG: $RG)"
          
          STATUS=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "properties.runningStatus" \
            -o tsv 2>/dev/null || echo "NotFound")
          
          echo "Status: $STATUS"
          
          if [ "$STATUS" = "Running" ]; then
            echo "✅ $APP_NAME is running"
          else
            echo "⚠️ $APP_NAME status: $STATUS"
          fi
      
      - name: Get Container App URL
        shell: bash
        run: |
          RG="${{ steps.app_names.outputs.resource_group }}"
          APP_NAME="${{ steps.app_names.outputs.api_app_name }}"
          
          FQDN=$(az containerapp show \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv 2>/dev/null || echo "N/A")
          
          if [ "$FQDN" != "N/A" ]; then
            echo "🌐 API URL: https://$FQDN"
          else
            echo "⚠️ No FQDN available for $APP_NAME"
          fi

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: 'Deployment Summary'
    needs: [determine-services, verify-infrastructure, build-images, deploy-apps, health-check]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🚀 Service Deployment: Dev" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Event:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 📋 Deployment Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Determine Services | ${{ needs.determine-services.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify Infrastructure | ${{ needs.verify-infrastructure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Images | ${{ needs.build-images.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy Apps | ${{ needs.deploy-apps.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health Check | ${{ needs.health-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Services:** ${{ needs.determine-services.outputs.services }}" >> "$GITHUB_STEP_SUMMARY"
