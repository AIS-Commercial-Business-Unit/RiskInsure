name: 'CD: Services Dev'

# ============================================================================
# Purpose: Auto-deploy services to dev after CI builds images
# Triggers: 
#   - After CI: Build Services completes (deploys changed services only)
#   - After CD: Infrastructure Dev completes (deploys all services)
#   - Manual workflow_dispatch (deploy specific services)
# Duration: ~8-12 minutes
# CRITICAL: Uses workflow_run.head_sha to deploy exact images CI built
# ============================================================================

on:
  # IMPORTANT: Do NOT run on push. CI runs on push; CD runs after CI success.
  workflow_run:
    workflows:
      - 'CI: Build Services'
      - 'CD: Infrastructure Dev'
    types: [ completed ]
    branches: [ main ]

  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated or "all")'
        required: true
        default: 'all'

env:
  TERRAFORM_VERSION: '1.11.4'
  ENVIRONMENT: 'dev'
  REGISTRY: 'riskinsuredevacr.azurecr.io'
  RG: 'CAIS-010-RiskInsure'

permissions:
  contents: read
  id-token: write

concurrency:
  group: riskinsure-services-dev
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Determine which services to deploy and which image tag to use
  # CRITICAL: Uses workflow_run.head_sha to match exact commit CI built
  # ==========================================================================
  determine:
    name: 'Determine Services + Image Tag'
    # Only proceed if workflow_run succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.out.outputs.services }}
      matrix_empty: ${{ steps.out.outputs.matrix_empty }}
      image_tag: ${{ steps.out.outputs.image_tag }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide services + image_tag
        id: out
        shell: bash
        run: |
          set -euo pipefail

          ALL_SERVICES='["billing","customer","fundstransfermgt","policy","ratingandunderwriting"]'

          # Decide which tag to deploy
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # Deploy the exact commit that CI built
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            # Manual run uses the current workflow's commit SHA
            IMAGE_TAG="${{ github.sha }}"
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          # Decide which services to deploy
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
              echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            services_input="${{ github.event.inputs.services }}"
            services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0))')
            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For workflow_run:
          # - If it was triggered by CI build, deploy only services changed in that commit (best fit).
          # - If it was triggered by infra deploy, deploy ALL services (safe).
          WF_NAME="${{ github.event.workflow_run.name }}"

          if [[ "$WF_NAME" == "CD: Infrastructure Dev" ]]; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # CI: Build Services triggered this CD -> deploy only changed services in that CI commit
          changed_files=$(git diff --name-only "${{ github.event.workflow_run.head_sha }}~1" "${{ github.event.workflow_run.head_sha }}" || true)

          # If we cannot diff (rare), fall back to all services
          if [[ -z "$changed_files" ]]; then
            echo "services=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_services=()
          for s in billing customer fundstransfermgt policy ratingandunderwriting; do
            if echo "$changed_files" | grep -q "^services/$s/"; then
              changed_services+=("\"$s\"")
            fi
          done

          if [[ ${#changed_services[@]} -eq 0 ]]; then
            # No service folder changed; do not deploy
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
          else
            services_json="[$(IFS=,; echo "${changed_services[*]}")]"
            echo "services=$services_json" >> "$GITHUB_OUTPUT"
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        shell: bash
        run: |
          echo "### 🚀 CD Deployment Inputs" >> "$GITHUB_STEP_SUMMARY"
          echo "**Trigger:** \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "**Upstream workflow:** \`${{ github.event.workflow_run.name }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "**Upstream status:** \`${{ github.event.workflow_run.conclusion }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**image_tag:** \`${{ steps.out.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**services:** \`${{ steps.out.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # CRITICAL: Verify infrastructure exists before deploying services
  # This prevents deployment failures due to missing resources
  # ==========================================================================
  verify-infra:
    name: 'Verify Infrastructure'
    needs: determine
    if: needs.determine.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      resource_group: ${{ steps.verify.outputs.resource_group }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify RG exists
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ env.RG }}"

          if ! az group show --name "$RG" >/dev/null 2>&1; then
            echo "Resource group not found: $RG"
            exit 1
          fi

          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Deploy Container Apps using Terraform with targeted deployments
  # Uses image_tag from determine job to deploy exact images CI built
  # ==========================================================================
  deploy:
    name: 'Deploy Container Apps'
    needs: [determine, verify-infra]
    if: needs.determine.outputs.matrix_empty == 'false'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: platform/infra/services

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Validate
        run: terraform validate

      - name: Build Terraform Targets
        id: targets
        shell: bash
        run: |
          set -euo pipefail

          SERVICES='${{ needs.determine.outputs.services }}'
          TARGETS=""

          for s in $(echo "$SERVICES" | jq -r '.[]'); do
            TARGETS="$TARGETS -target=azurerm_container_app.${s}_api"
            TARGETS="$TARGETS -target=azurerm_container_app.${s}_endpoint"
          done

          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "Targets: $TARGETS"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="image_tag=${{ needs.determine.outputs.image_tag }}" \
            ${{ steps.targets.outputs.targets }} \
            -out=tfplan \
            -input=false
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: 'Deployment Summary'
    needs: [determine, verify-infra, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🚀 CD Services Dev Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**image_tag:** \`${{ needs.determine.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**services:** \`${{ needs.determine.outputs.services }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Determine | ${{ needs.determine.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify Infra | ${{ needs.verify-infra.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
