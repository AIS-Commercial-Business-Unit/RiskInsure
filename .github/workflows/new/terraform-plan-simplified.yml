name: 'Manual Deployment (Legacy - Use New Workflows Instead)'

# ============================================================================
# DEPRECATED: This workflow is kept for emergency manual deployments only
# 
# RECOMMENDED: Use the new workflows instead:
#   - PR validation: pr-terraform-validate.yml, pr-unit-tests.yml
#   - Infrastructure: cd-infra-dev.yml
#   - Services: cd-services-dev.yml
#   - Tests: ci-test-integration.yml
#   - Rollback: ops-rollback.yml
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What do you want to deploy?'
        type: choice
        required: true
        options:
          - 'Infrastructure (Foundation + Shared Services)'
          - 'Services (All 5 services)'
          - 'Single Service'
          - 'Everything (Infra + Services)'
      
      single_service:
        description: 'If deploying single service, which one?'
        type: choice
        required: false
        options:
          - billing
          - customer
          - fundstransfermgt
          - policy
          - ratingandunderwriting
      
      environment:
        description: 'Environment'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod
      
      terraform_action:
        description: 'Terraform action'
        type: choice
        required: true
        default: 'plan'
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: 'Manual Deployment'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Show Deprecation Warning
        run: |
          echo "⚠️ ============================================"
          echo "⚠️ WARNING: This workflow is DEPRECATED"
          echo "⚠️ ============================================"
          echo ""
          echo "Please use the new workflows instead:"
          echo ""
          echo "📋 For Infrastructure:"
          echo "   Actions → CD: Infrastructure Dev → Run workflow"
          echo ""
          echo "📋 For Services:"
          echo "   Actions → CD: Services Dev → Run workflow"
          echo ""
          echo "📋 For Rollback:"
          echo "   Actions → OPS: Rollback Service → Run workflow"
          echo ""
          echo "This workflow will be removed in 30 days."
          echo "=============================================="
          echo ""
          sleep 5
      
      - name: Redirect to Correct Workflow
        run: |
          echo "🔄 Based on your selection: ${{ github.event.inputs.action }}"
          echo ""
          
          case "${{ github.event.inputs.action }}" in
            "Infrastructure (Foundation + Shared Services)")
              echo "✅ Use: Actions → CD: Infrastructure Dev"
              echo "   - layer: all"
              echo "   - action: ${{ github.event.inputs.terraform_action }}"
              ;;
            "Services (All 5 services)")
              echo "✅ Use: Actions → CD: Services Dev"
              echo "   - services: all"
              ;;
            "Single Service")
              echo "✅ Use: Actions → CD: Services Dev"
              echo "   - services: ${{ github.event.inputs.single_service }}"
              ;;
            "Everything (Infra + Services)")
              echo "✅ Use:"
              echo "   1. Actions → CD: Infrastructure Dev (layer: all)"
              echo "   2. Wait 3 minutes"
              echo "   3. Actions → CD: Services Dev (services: all)"
              ;;
          esac
          
          echo ""
          echo "❌ This workflow will exit now without deploying."
          echo "Please use the workflows mentioned above."
          exit 1
