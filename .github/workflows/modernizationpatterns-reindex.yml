name: Modernization Patterns - Reindex on Content Changes

on:
  workflow_dispatch:
    inputs:
      reindex_mode:
        description: "Select reindex strategy for best results"
        required: true
        default: "incremental"
        type: choice
        options:
          - "📝 Index New/Modified Documents (Fast ⚡)"
          - "🔄 Full Clean Reindex (Thorough 🔍)"
  push:
    branches:
      - main
      - Dev
    paths:
      # Trigger on content file changes (new/modified/deleted patterns)
      - "platform/modernizationpatterns/content/patterns/**"
      - "platform/modernizationpatterns/content-tools/**"
      # Trigger on reindex service changes
      - "platform/modernizationpatterns/Api/reindex/**"
      # Trigger on this workflow file
      - ".github/workflows/modernizationpatterns-reindex.yml"
  workflow_call:
    inputs:
      reindex_mode:
        description: "Reindex mode: 'incremental' or 'full-clean'"
        required: true
        default: "incremental"
        type: string

env:
  REGISTRY: riskinsuredevacr.azurecr.io
  IMAGE_NAME: reindex-worker
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      content_changed: ${{ steps.changes.outputs.content_changed }}
      reindex_code_changed: ${{ steps.changes.outputs.reindex_code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        run: |
          # Get changed files in this push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CONTENT_CHANGED="true"
            REINDEX_CHANGED="true"
          else
            # Compare with main branch
            CONTENT_CHANGED=$(git diff --name-only origin/main HEAD | grep -c "platform/modernizationpatterns/content/patterns\|platform/modernizationpatterns/content-tools" || echo "0")
            REINDEX_CHANGED=$(git diff --name-only origin/main HEAD | grep -c "platform/modernizationpatterns/Api/reindex" || echo "0")
          fi
          
          echo "content_changed=$([[ "$CONTENT_CHANGED" -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "reindex_code_changed=$([[ "$REINDEX_CHANGED" -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  build-and-push-reindex:
    name: Build & Push Reindex Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.reindex_code_changed == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image metadata
        id: meta
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')
          GIT_SHA=${{ github.sha }}
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GIT_SHA:0:7}-${TIMESTAMP}"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "tag_short=${GIT_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./platform/modernizationpatterns
          file: ./platform/modernizationpatterns/Dockerfile.reindex-worker
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Print image details
        run: |
          echo "✅ Docker image pushed successfully"
          echo "Image: ${{ steps.meta.outputs.tags }}"
          echo "Latest tag also applied"

  deploy-reindex:
    name: Deploy Reindex to Container Apps
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push-reindex]
    if: needs.build-and-push-reindex.result == 'success' || (needs.detect-changes.outputs.content_changed == 'true' && github.event_name != 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get new image URI
        id: image
        run: |
          # Use the new image if we built one, otherwise use latest
          if [ "${{ needs.build-and-push-reindex.result }}" == "success" ]; then
            IMAGE="${{ needs.build-and-push-reindex.outputs.image_tag }}"
          else
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Update Container App image
        run: |
          az containerapp update \
            --name modernizationpatterns-reindex \
            --resource-group CAIS-010-RiskInsure \
            --image "${{ steps.image.outputs.image }}" \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"

      - name: Wait for revisions
        run: |
          echo "⏳ Waiting for Container App to update..."
          sleep 30
          az containerapp show \
            --name modernizationpatterns-reindex \
            --resource-group CAIS-010-RiskInsure \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query "properties.latestRevisionName" -o tsv

  trigger-reindex:
    name: Trigger Reindex Pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-reindex]
    if: needs.detect-changes.outputs.content_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Get Container App FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name modernizationpatterns-reindex \
            --resource-group CAIS-010-RiskInsure \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv 2>/dev/null || echo "localhost:5010")
          
          echo "fqdn=https://${FQDN}" >> $GITHUB_OUTPUT
          echo "Reindex endpoint: https://${FQDN}"

      - name: Detect change types (Smart Incremental Reindex)
        id: change_detection
        run: |
          # Parse user-friendly mode selection to clean flag
          REINDEX_MODE="${{ inputs.reindex_mode || 'incremental' }}"
          
          case "$REINDEX_MODE" in
            *"📝 Index New"*)
              FORCE_INCREMENTAL="true"
              ;;
            *"🔄 Full Clean"*)
              FORCE_FULL_CLEAN="true"
              ;;
            "full-clean")
              FORCE_FULL_CLEAN="true"
              ;;
            "incremental"|*)
              FORCE_INCREMENTAL="true"
              ;;
          esac

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual dispatch - use user's selection
            if [ "$FORCE_FULL_CLEAN" == "true" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (manual request)"
            else
              CLEAN="false"
              TRIGGER_TYPE="📝 New/Modified Documents Only (manual request)"
            fi
            ADDED_FILES=""
            MODIFIED_FILES=""
            DELETED_FILES=""
          else
            # Automatic detection based on pushed changes
            ADDED_FILES=$(git diff --name-status HEAD~1 HEAD | grep "^A.*platform/modernizationpatterns/content/patterns.*\.json" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            MODIFIED_FILES=$(git diff --name-status HEAD~1 HEAD | grep "^M.*platform/modernizationpatterns/content/patterns.*\.json" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            DELETED_FILES=$(git diff --name-status HEAD~1 HEAD | grep "^D.*platform/modernizationpatterns/content/patterns.*\.json" | cut -f2 | tr '\n' ',' | sed 's/,$//')

            ADDED_COUNT=$(echo "$ADDED_FILES" | grep -o '\.json' | wc -l)
            MODIFIED_COUNT=$(echo "$MODIFIED_FILES" | grep -o '\.json' | wc -l)
            DELETED_COUNT=$(echo "$DELETED_FILES" | grep -o '\.json' | wc -l)

            # Strategy:
            # - If files ADDED/MODIFIED only → incremental (clean=false)
            # - If files DELETED → full reindex (clean=true) to remove orphaned docs
            # - If mix → full reindex for safety
            if [ -n "$DELETED_FILES" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (${DELETED_COUNT} file(s) deleted - removing from index)"
            elif [ -n "$ADDED_FILES" ] || [ -n "$MODIFIED_FILES" ]; then
              CLEAN="false"
              TRIGGER_TYPE="📝 Incremental Update (Added: ${ADDED_COUNT}, Modified: ${MODIFIED_COUNT})"
            else
              CLEAN="false"
              TRIGGER_TYPE="⏭️  No pattern files changed"
            fi
          fi

          echo "clean=${CLEAN}" >> $GITHUB_OUTPUT
          echo "trigger_type=${TRIGGER_TYPE}" >> $GITHUB_OUTPUT
          echo "added_files=${ADDED_FILES}" >> $GITHUB_OUTPUT
          echo "modified_files=${MODIFIED_FILES}" >> $GITHUB_OUTPUT
          echo "deleted_files=${DELETED_FILES}" >> $GITHUB_OUTPUT
          echo "TRIGGER_TYPE=${TRIGGER_TYPE}" >> $GITHUB_ENV

      - name: Trigger incremental or full reindex
        id: reindex
        run: |
          CLEAN="${{ steps.change_detection.outputs.clean }}"
          ADDED="${{ steps.change_detection.outputs.added_files }}"
          MODIFIED="${{ steps.change_detection.outputs.modified_files }}"
          DELETED="${{ steps.change_detection.outputs.deleted_files }}"
          ENDPOINT="${{ steps.fqdn.outputs.fqdn }}/api/reindex"

          echo "🔄 Starting reindex..."
          echo "Strategy: ${{ steps.change_detection.outputs.trigger_type }}"
          echo "Endpoint: ${ENDPOINT}"
          echo "Clean mode: ${CLEAN}"
          echo ""

          if [ "${CLEAN}" == "true" ]; then
            echo "⚠️  Using FULL CLEAN REINDEX (deletions detected)"
            QUERY_PARAMS="?clean=true"
          else
            echo "⚡ Using INCREMENTAL REINDEX (only adds/modifications)"
            QUERY_PARAMS="?clean=false"
            if [ -n "$ADDED" ]; then
              echo "📝 Added files: ${ADDED}"
            fi
            if [ -n "$MODIFIED" ]; then
              echo "✏️  Modified files: ${MODIFIED}"
            fi
          fi
          
          echo ""
          echo "📤 Sending reindex request (timeout: 300s)..."
          
          RESPONSE=$(curl -X POST \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            "${ENDPOINT}${QUERY_PARAMS}" \
            --max-time 300 \
            --connect-timeout 10)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo ""
          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          echo "$BODY"
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "reindex_success=true" >> $GITHUB_OUTPUT
            # Extract metrics from response
            DOCS=$(echo "$BODY" | jq -r '.documentsUploaded // "N/A"' 2>/dev/null)
            CHUNKS=$(echo "$BODY" | jq -r '.totalChunks // "N/A"' 2>/dev/null)
            DURATION=$(echo "$BODY" | jq -r '.operationTimeSeconds // "N/A"' 2>/dev/null)
            echo "metrics=📝 Documents: $DOCS, 🔗 Chunks: $CHUNKS, ⏱️ Duration: ${DURATION}s" >> $GITHUB_OUTPUT
          else
            echo "reindex_success=false" >> $GITHUB_OUTPUT
            echo "metrics=HTTP $HTTP_CODE - Check logs" >> $GITHUB_OUTPUT
            exit 1
          fi

  verify-index:
    name: Verify Reindex Success
    runs-on: ubuntu-latest
    needs: [trigger-reindex]
    if: always()
    steps:
      - name: Get ACR connection
        run: |
          az acr repository list \
            --name riskinsuredevacr \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --output table

      - name: Generate detailed summary
        run: |
          echo "## 🎯 Modernization Patterns - Reindex Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "**Result**: ${{ needs.trigger-reindex.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Reindex Strategy" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.TRIGGER_TYPE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.trigger-reindex.outputs.metrics }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Why This Strategy?" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ **Incremental** (added/modified only): Fast, only updates changed documents" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **Full Clean** (deletions detected): Removes orphaned docs for data consistency" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.trigger-reindex.result }}" == "success" ]; then
            echo "✅ Chat API will automatically use updated patterns within 30 seconds" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Check Container App logs: \`az containerapp logs show -n modernizationpatterns-reindex -g CAIS-010-RiskInsure\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: needs.trigger-reindex.result == 'failure'
        run: |
          echo "❌ Reindex failed!"
          echo "Check Container App logs: modernizationpatterns-reindex"
          exit 1

      - name: Success notification
        if: needs.trigger-reindex.result == 'success'
        run: |
          echo "✅ Reindex completed successfully!"
          echo "Log into Container Apps to view detailed reindex logs"
