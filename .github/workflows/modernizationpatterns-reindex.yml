name: Modernization Patterns - Reindex on Content Changes

on:
  workflow_dispatch:
    inputs:
      reindex_mode:
        description: "Select reindex strategy"
        required: true
        default: "Index New/Modified Documents"
        type: choice
        options:
          - "Index New/Modified Documents "
          - "Full Clean Reindex"
  push:
    branches:
      - main
    paths:
      # Trigger on _inbox, patterns, and agentic folder changes (documents to be indexed)
      - "platform/modernizationpatterns/content/_inbox/**"
      - "platform/modernizationpatterns/content/patterns/**"
      - "platform/modernizationpatterns/content/agentic/**"

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      content_changed: ${{ steps.changes.outputs.content_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        run: |
          # Get changed files in this push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CONTENT_CHANGED="true"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1)
            fi

            # Only check _inbox, patterns, and agentic folders (documents to be indexed)
            if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
                platform/modernizationpatterns/content/_inbox \
                platform/modernizationpatterns/content/patterns \
                platform/modernizationpatterns/content/agentic; then
              CONTENT_CHANGED="false"
            else
              CONTENT_CHANGED="true"
            fi
          fi

          echo "content_changed=${CONTENT_CHANGED}" >> $GITHUB_OUTPUT
          echo "📊 Content changed: ${CONTENT_CHANGED}"

  trigger-reindex:
    name: Trigger Reindex Pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes]
    outputs:
      metrics: ${{ steps.reindex.outputs.metrics }}
      trigger_type: ${{ steps.change_detection.outputs.trigger_type }}
      patterns_indexed: ${{ steps.reindex.outputs.patterns_indexed }}
      inbox_indexed: ${{ steps.reindex.outputs.inbox_indexed }}
      pdf_count: ${{ steps.reindex.outputs.pdf_count }}
      docx_count: ${{ steps.reindex.outputs.docx_count }}
      md_count: ${{ steps.reindex.outputs.md_count }}
      txt_count: ${{ steps.reindex.outputs.txt_count }}
      json_count: ${{ steps.reindex.outputs.json_count }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.content_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name modernizationpatterns-reindex \
            --resource-group CAIS-010-RiskInsure \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv 2>/dev/null || echo "localhost:5010")

          echo "fqdn=https://${FQDN}" >> $GITHUB_OUTPUT
          echo "Reindex endpoint: https://${FQDN}"

      - name: Detect change types (Smart Index New/Modified Documents Reindex)
        id: change_detection
        run: |
          REINDEX_MODE="${{ inputs.reindex_mode || 'Index New/Modified Documents' }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual dispatch - use user's selection
            if [ "$REINDEX_MODE" == "Full Clean Reindex" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (manual request)"
            else
              CLEAN="false"
              TRIGGER_TYPE="📝 Index New/Modified Documents Reindex (manual request)"
            fi
            ADDED_FILES=""
            MODIFIED_FILES=""
            DELETED_FILES=""
          else
            # Automatic detection based on pushed changes
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1)
            fi

            # Detect changes in _inbox, patterns, and agentic folders
            ADDED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^A.*platform/modernizationpatterns/content/(_inbox|patterns|agentic)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            MODIFIED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^M.*platform/modernizationpatterns/content/(_inbox|patterns|agentic)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            DELETED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^D.*platform/modernizationpatterns/content/(_inbox|patterns|agentic)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')

            ADDED_COUNT=$([ -n "$ADDED_FILES" ] && echo "$ADDED_FILES" | awk -F',' '{print NF}' || echo 0)
            MODIFIED_COUNT=$([ -n "$MODIFIED_FILES" ] && echo "$MODIFIED_FILES" | awk -F',' '{print NF}' || echo 0)
            DELETED_COUNT=$([ -n "$DELETED_FILES" ] && echo "$DELETED_FILES" | awk -F',' '{print NF}' || echo 0)

            # Strategy:
            # - If files ADDED/MODIFIED only → Index New/Modified Documents (clean=false)
            # - If files DELETED → full reindex (clean=true) to remove orphaned docs
            # - If mix → full reindex for safety
            if [ -n "$DELETED_FILES" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (${DELETED_COUNT} file(s) deleted - removing from index)"
            elif [ -n "$ADDED_FILES" ] || [ -n "$MODIFIED_FILES" ]; then
              CLEAN="false"
              TRIGGER_TYPE="📝 Index New/Modified Documents Update (Added: ${ADDED_COUNT}, Modified: ${MODIFIED_COUNT})"
            else
              CLEAN="false"
              TRIGGER_TYPE="⏭️  No content files changed"
            fi
          fi

          echo "clean=${CLEAN}" >> $GITHUB_OUTPUT
          echo "trigger_type=${TRIGGER_TYPE}" >> $GITHUB_OUTPUT
          echo "added_files=${ADDED_FILES}" >> $GITHUB_OUTPUT
          echo "modified_files=${MODIFIED_FILES}" >> $GITHUB_OUTPUT
          echo "deleted_files=${DELETED_FILES}" >> $GITHUB_OUTPUT
          echo "TRIGGER_TYPE=${TRIGGER_TYPE}" >> $GITHUB_ENV

      - name: Trigger Index New/Modified Documents or full reindex
        id: reindex
        run: |
          CLEAN="${{ steps.change_detection.outputs.clean }}"
          ADDED="${{ steps.change_detection.outputs.added_files }}"
          MODIFIED="${{ steps.change_detection.outputs.modified_files }}"
          DELETED="${{ steps.change_detection.outputs.deleted_files }}"
          ENDPOINT="${{ steps.fqdn.outputs.fqdn }}/api/reindex"
          HEALTH_ENDPOINT="${{ steps.fqdn.outputs.fqdn }}/health"

          echo "🔄 Starting reindex..."
          echo "Strategy: ${{ steps.change_detection.outputs.trigger_type }}"
          echo "Endpoint: ${ENDPOINT}"
          echo "Clean mode: ${CLEAN}"
          echo ""

          # Wake up container - may be scaled to zero, wait for it
          # Container Apps can return 404/502/503 while waking up from scale-to-zero
          echo "🏥 Waking up container (may take up to 3 minutes if scaled to zero)..."
          MAX_HEALTH_ATTEMPTS=18
          HEALTH_WAIT=10
          CONTAINER_READY=false
          for i in $(seq 1 $MAX_HEALTH_ATTEMPTS); do
            HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT" --connect-timeout 15 --max-time 20 || true)
            if [ -z "$HEALTH_RESPONSE" ]; then
              HEALTH_RESPONSE="000"
            fi

            if [ "$HEALTH_RESPONSE" == "200" ]; then
              echo "✅ Container is healthy (attempt $i)"
              CONTAINER_READY=true
              break
            elif [ "$HEALTH_RESPONSE" == "404" ] || [ "$HEALTH_RESPONSE" == "502" ] || [ "$HEALTH_RESPONSE" == "503" ]; then
              # Container is starting up - 404/502/503 are normal during cold start
              echo "⏳ Container waking up (HTTP $HEALTH_RESPONSE), waiting ${HEALTH_WAIT}s... (attempt $i/$MAX_HEALTH_ATTEMPTS)"
            elif [ "$HEALTH_RESPONSE" == "000" ]; then
              echo "⏳ Connection failed, container may be starting... (attempt $i/$MAX_HEALTH_ATTEMPTS)"
            else
              echo "⏳ Unexpected response (HTTP $HEALTH_RESPONSE), waiting... (attempt $i/$MAX_HEALTH_ATTEMPTS)"
            fi

            sleep $HEALTH_WAIT
          done

          if [ "$CONTAINER_READY" != "true" ]; then
            echo "⚠️ Container health check timed out, but proceeding with API call anyway..."
          fi

          if [ "${CLEAN}" == "true" ]; then
            echo "⚠️  Using FULL CLEAN REINDEX (deletions detected)"
            QUERY_PARAMS="?clean=true"
          else
            echo "⚡ Using Index New/Modified Documents REINDEX (only adds/modifications)"
            QUERY_PARAMS="?clean=false"
            if [ -n "$ADDED" ]; then
              echo "📝 Added files: ${ADDED}"
            fi
            if [ -n "$MODIFIED" ]; then
              echo "✏️  Modified files: ${MODIFIED}"
            fi
          fi

          echo ""
          echo "📤 Sending reindex request with retry logic..."
          echo "⚠️  WARNING: Using Free tier Azure OpenAI with rate limiting (3-6 RPM)"
          echo "    Reindex may take 10-20 minutes for large content sets"
          echo "    For production: Upgrade to Standard/Pro tier for 10x faster reindex"
          echo ""
          echo "Timeout: 900s (15 minutes per attempt)"

          # Default outputs (overridden on success)
          echo "patterns_indexed=0" >> $GITHUB_OUTPUT
          echo "inbox_indexed=0" >> $GITHUB_OUTPUT
          echo "pdf_count=0" >> $GITHUB_OUTPUT
          echo "docx_count=0" >> $GITHUB_OUTPUT
          echo "md_count=0" >> $GITHUB_OUTPUT
          echo "txt_count=0" >> $GITHUB_OUTPUT
          echo "json_count=0" >> $GITHUB_OUTPUT

          # Retry logic for transient failures (404/502/503/504 - container may still be waking)
          MAX_ATTEMPTS=5
          RETRY_WAIT=30
          JOB_ID=""

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS..."

            HTTP_CODE=$(curl -sS -X POST \
              -H "Content-Type: application/json" \
              -o /tmp/reindex_response.json \
              -w "%{http_code}" \
              "${ENDPOINT}${QUERY_PARAMS}" \
              --max-time 900 \
              --connect-timeout 30 || echo "000")

            BODY=$(cat /tmp/reindex_response.json 2>/dev/null || echo "")

            echo "HTTP Status: $HTTP_CODE"

            # Async job accepted (202) - new async API pattern
            if [ "$HTTP_CODE" == "202" ]; then
              JOB_ID=$(echo "$BODY" | jq -r '.jobId // ""' 2>/dev/null || echo "")
              if [ -n "$JOB_ID" ]; then
                echo "✅ Reindex job started successfully (Job ID: $JOB_ID)"
                echo "📊 Polling for completion..."
                break
              else
                echo "❌ 202 received but no jobId in response"
                echo "Response: $BODY"
                exit 1
              fi
            fi

            # Legacy sync success (200) - keep for backward compatibility
            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Reindex completed successfully (sync mode)"
              echo ""
              echo "Response:"
              echo "$BODY"
              echo "reindex_success=true" >> $GITHUB_OUTPUT
              DOCS=$(echo "$BODY" | jq -r '.documentsUploaded // "N/A"' 2>/dev/null || echo "N/A")
              CHUNKS=$(echo "$BODY" | jq -r '.chunksCreated // .totalChunks // "N/A"' 2>/dev/null || echo "N/A")
              DURATION=$(echo "$BODY" | jq -r '.elapsedSeconds // .operationTimeSeconds // "N/A"' 2>/dev/null || echo "N/A")
              PATTERNS_INDEXED=$(echo "$BODY" | jq -r '.patternsProcessed // (.patterns // [] | length) // 0' 2>/dev/null || echo "0")
              INBOX_INDEXED=$(echo "$BODY" | jq -r '.inboxDocumentsProcessed // (.inboxDocuments // [] | length) // 0' 2>/dev/null || echo "0")
              PDF_COUNT=$(echo "$BODY" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".pdf"))) | length' 2>/dev/null || echo "0")
              DOCX_COUNT=$(echo "$BODY" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".docx"))) | length' 2>/dev/null || echo "0")
              MD_COUNT=$(echo "$BODY" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".md") or endswith(".markdown"))) | length' 2>/dev/null || echo "0")
              TXT_COUNT=$(echo "$BODY" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".txt"))) | length' 2>/dev/null || echo "0")
              JSON_COUNT=$(echo "$BODY" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".json"))) | length' 2>/dev/null || echo "0")

              echo "metrics=📝 Documents: $DOCS, 🔗 Chunks: $CHUNKS, ⏱️ Duration: ${DURATION}s" >> $GITHUB_OUTPUT
              echo "patterns_indexed=$PATTERNS_INDEXED" >> $GITHUB_OUTPUT
              echo "inbox_indexed=$INBOX_INDEXED" >> $GITHUB_OUTPUT
              echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT
              echo "docx_count=$DOCX_COUNT" >> $GITHUB_OUTPUT
              echo "md_count=$MD_COUNT" >> $GITHUB_OUTPUT
              echo "txt_count=$TXT_COUNT" >> $GITHUB_OUTPUT
              echo "json_count=$JSON_COUNT" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Transient failures - retry (including 404 for cold start scenarios)
            if [ "$HTTP_CODE" == "404" ] || [ "$HTTP_CODE" == "502" ] || [ "$HTTP_CODE" == "503" ] || [ "$HTTP_CODE" == "504" ] || [ "$HTTP_CODE" == "000" ]; then
              echo "⚠️ Transient failure (HTTP $HTTP_CODE), retrying in ${RETRY_WAIT}s..."
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                sleep $RETRY_WAIT
                continue
              fi
            fi

            # Non-retryable failure
            echo "❌ Reindex failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            break
          done

          # If we got a job ID, poll for completion
          if [ -n "$JOB_ID" ]; then
            STATUS_URL="${{ steps.fqdn.outputs.fqdn }}/api/reindex/${JOB_ID}"
            echo ""
            echo "🔄 Polling job status: $STATUS_URL"
            echo "   (Checking every 30 seconds, timeout after 30 minutes)"
            echo ""

            MAX_POLL_ATTEMPTS=60  # 60 * 30s = 30 minutes max
            POLL_WAIT=30

            for poll in $(seq 1 $MAX_POLL_ATTEMPTS); do
              STATUS_CODE=$(curl -sS -o /tmp/status_response.json -w "%{http_code}" "$STATUS_URL" --max-time 30 || echo "000")
              STATUS_BODY=$(cat /tmp/status_response.json 2>/dev/null || echo "")

              if [ "$STATUS_CODE" != "200" ]; then
                echo "⚠️ Status check returned HTTP $STATUS_CODE, retrying..."
                sleep $POLL_WAIT
                continue
              fi

              JOB_STATE=$(echo "$STATUS_BODY" | jq -r '.state // "unknown"' 2>/dev/null || echo "unknown")
              PROGRESS=$(echo "$STATUS_BODY" | jq -r '.progress // 0' 2>/dev/null || echo "0")
              CURRENT_STEP=$(echo "$STATUS_BODY" | jq -r '.currentStep // "Processing..."' 2>/dev/null || echo "Processing...")

              echo "[$poll/$MAX_POLL_ATTEMPTS] State: $JOB_STATE | Progress: $PROGRESS% | Step: $CURRENT_STEP"

              if [ "$JOB_STATE" == "completed" ]; then
                echo ""
                echo "✅ Reindex job completed successfully!"
                echo ""

                # Extract results from the completed job
                RESULT=$(echo "$STATUS_BODY" | jq -r '.result // {}' 2>/dev/null || echo "{}")
                DOCS=$(echo "$RESULT" | jq -r '.documentsUploaded // "N/A"' 2>/dev/null || echo "N/A")
                CHUNKS=$(echo "$RESULT" | jq -r '.chunksCreated // "N/A"' 2>/dev/null || echo "N/A")
                DURATION=$(echo "$RESULT" | jq -r '.elapsedSeconds // "N/A"' 2>/dev/null || echo "N/A")
                PATTERNS_INDEXED=$(echo "$RESULT" | jq -r '.patternsProcessed // 0' 2>/dev/null || echo "0")
                INBOX_INDEXED=$(echo "$RESULT" | jq -r '.inboxDocumentsProcessed // 0' 2>/dev/null || echo "0")
                PDF_COUNT=$(echo "$RESULT" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".pdf"))) | length' 2>/dev/null || echo "0")
                DOCX_COUNT=$(echo "$RESULT" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".docx"))) | length' 2>/dev/null || echo "0")
                MD_COUNT=$(echo "$RESULT" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".md") or endswith(".markdown"))) | length' 2>/dev/null || echo "0")
                TXT_COUNT=$(echo "$RESULT" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".txt"))) | length' 2>/dev/null || echo "0")
                JSON_COUNT=$(echo "$RESULT" | jq -r '(.inboxDocuments // []) | map(ascii_downcase | select(endswith(".json"))) | length' 2>/dev/null || echo "0")

                echo "📊 Results:"
                echo "   Documents uploaded: $DOCS"
                echo "   Chunks created: $CHUNKS"
                echo "   Duration: ${DURATION}s"
                echo "   Patterns: $PATTERNS_INDEXED"
                echo "   Inbox docs: $INBOX_INDEXED"

                echo "reindex_success=true" >> $GITHUB_OUTPUT
                echo "metrics=📝 Documents: $DOCS, 🔗 Chunks: $CHUNKS, ⏱️ Duration: ${DURATION}s" >> $GITHUB_OUTPUT
                echo "patterns_indexed=$PATTERNS_INDEXED" >> $GITHUB_OUTPUT
                echo "inbox_indexed=$INBOX_INDEXED" >> $GITHUB_OUTPUT
                echo "pdf_count=$PDF_COUNT" >> $GITHUB_OUTPUT
                echo "docx_count=$DOCX_COUNT" >> $GITHUB_OUTPUT
                echo "md_count=$MD_COUNT" >> $GITHUB_OUTPUT
                echo "txt_count=$TXT_COUNT" >> $GITHUB_OUTPUT
                echo "json_count=$JSON_COUNT" >> $GITHUB_OUTPUT
                exit 0
              fi

              if [ "$JOB_STATE" == "failed" ]; then
                echo ""
                echo "❌ Reindex job failed!"
                ERROR=$(echo "$STATUS_BODY" | jq -r '.error // "Unknown error"' 2>/dev/null || echo "Unknown error")
                ERROR_MSG=$(echo "$STATUS_BODY" | jq -r '.errorMessage // ""' 2>/dev/null || echo "")
                echo "Error: $ERROR"
                echo "Message: $ERROR_MSG"
                echo "reindex_success=false" >> $GITHUB_OUTPUT
                echo "metrics=❌ Failed: $ERROR" >> $GITHUB_OUTPUT
                exit 1
              fi

              # Still running, wait and poll again
              sleep $POLL_WAIT
            done

            # Timeout waiting for job
            echo "❌ Timeout waiting for reindex job to complete (30 minutes)"
            echo "reindex_success=false" >> $GITHUB_OUTPUT
            echo "metrics=⏱️ Timeout after 30 minutes" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "reindex_success=false" >> $GITHUB_OUTPUT
          echo "metrics=HTTP $HTTP_CODE - Check logs" >> $GITHUB_OUTPUT
          exit 1

  verify-index:
    name: Verify Reindex Success
    runs-on: ubuntu-latest
    needs: [trigger-reindex]
    if: always()
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR connection
        run: |
          az acr repository list \
            --name riskinsuredevacr \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --output table

      - name: Generate detailed summary
        run: |
          echo "## 🎯 Modernization Patterns - Reindex Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "**Result**: ${{ needs.trigger-reindex.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Reindex Strategy" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.trigger-reindex.outputs.trigger_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.trigger-reindex.outputs.metrics }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Indexed Content Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|" >> $GITHUB_STEP_SUMMARY
          echo "| Patterns Indexed | ${{ needs.trigger-reindex.outputs.patterns_indexed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Inbox Documents Indexed | ${{ needs.trigger-reindex.outputs.inbox_indexed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PDF (.pdf) | ${{ needs.trigger-reindex.outputs.pdf_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DOCX (.docx) | ${{ needs.trigger-reindex.outputs.docx_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown (.md/.markdown) | ${{ needs.trigger-reindex.outputs.md_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Text (.txt) | ${{ needs.trigger-reindex.outputs.txt_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON (.json) | ${{ needs.trigger-reindex.outputs.json_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Why This Strategy?" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ **Index New/Modified Documents** (added/modified only): Fast, only updates changed documents" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **Full Clean** (deletions detected): Removes orphaned docs for data consistency" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.trigger-reindex.result }}" == "success" ]; then
            echo "✅ Chat API will automatically use updated patterns within 30 seconds" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Check Container App logs: \`az containerapp logs show -n modernizationpatterns-reindex -g CAIS-010-RiskInsure\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: needs.trigger-reindex.result == 'failure'
        run: |
          echo "❌ Reindex failed!"
          echo "Check Container App logs: modernizationpatterns-reindex"
          exit 1

      - name: Success notification
        if: needs.trigger-reindex.result == 'success'
        run: |
          echo "✅ Reindex completed successfully!"
          echo "Log into Container Apps to view detailed reindex logs"
