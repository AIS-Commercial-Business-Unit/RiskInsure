name: Modernization Patterns - Reindex on Content Changes

on:
  workflow_dispatch:
    inputs:
      reindex_mode:
        description: "Select reindex strategy"
        required: true
        default: "Index New/Modified Documents"
        type: choice
        options:
          - "Index New/Modified Documents"
          - "Full Clean Reindex"
  push:
    branches:
      - main
    paths:
      - "platform/modernizationpatterns/content/_inbox/**"
      - "platform/modernizationpatterns/content/patterns/**"

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      content_changed: ${{ steps.changes.outputs.content_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CONTENT_CHANGED="true"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1)
            fi

            if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
                platform/modernizationpatterns/content/_inbox \
                platform/modernizationpatterns/content/patterns; then
              CONTENT_CHANGED="false"
            else
              CONTENT_CHANGED="true"
            fi
          fi

          echo "content_changed=${CONTENT_CHANGED}" >> $GITHUB_OUTPUT
          echo "📊 Content changed: ${CONTENT_CHANGED}"

  trigger-reindex:
    name: Trigger Reindex Pipeline
    runs-on: ubuntu-latest
    needs: [detect-changes]
    outputs:
      metrics: ${{ steps.reindex.outputs.metrics }}
      trigger_type: ${{ steps.change_detection.outputs.trigger_type }}
      patterns_indexed: ${{ steps.reindex.outputs.patterns_indexed }}
      inbox_indexed: ${{ steps.reindex.outputs.inbox_indexed }}
      pdf_count: ${{ steps.reindex.outputs.pdf_count }}
      docx_count: ${{ steps.reindex.outputs.docx_count }}
      md_count: ${{ steps.reindex.outputs.md_count }}
      txt_count: ${{ steps.reindex.outputs.txt_count }}
      json_count: ${{ steps.reindex.outputs.json_count }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.content_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name modernizationpatterns-reindex \
            --resource-group CAIS-010-RiskInsure \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv 2>/dev/null || echo "localhost:5010")

          echo "fqdn=https://${FQDN}" >> $GITHUB_OUTPUT
          echo "Reindex endpoint: https://${FQDN}"

      - name: Detect change types (Smart Index New/Modified Documents Reindex)
        id: change_detection
        run: |
          REINDEX_MODE="${{ inputs.reindex_mode || 'Index New/Modified Documents' }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "$REINDEX_MODE" == "Full Clean Reindex" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (manual request)"
            else
              CLEAN="false"
              TRIGGER_TYPE="📝 Index New/Modified Documents Reindex (manual request)"
            fi
            ADDED_FILES=""
            MODIFIED_FILES=""
            DELETED_FILES=""
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA=$(git rev-parse HEAD~1)
            fi

            ADDED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^A.*platform/modernizationpatterns/content/(_inbox|patterns)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            MODIFIED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^M.*platform/modernizationpatterns/content/(_inbox|patterns)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')
            DELETED_FILES=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" | grep -E "^D.*platform/modernizationpatterns/content/(_inbox|patterns)/" | cut -f2 | tr '\n' ',' | sed 's/,$//')

            if [ -n "$DELETED_FILES" ]; then
              CLEAN="true"
              TRIGGER_TYPE="🔄 Full Clean Reindex (deletions detected)"
            elif [ -n "$ADDED_FILES" ] || [ -n "$MODIFIED_FILES" ]; then
              CLEAN="false"
              TRIGGER_TYPE="📝 Index New/Modified Documents Update"
            else
              CLEAN="false"
              TRIGGER_TYPE="⏭️ No content files changed"
            fi
          fi

          echo "clean=${CLEAN}" >> $GITHUB_OUTPUT
          echo "trigger_type=${TRIGGER_TYPE}" >> $GITHUB_OUTPUT
          echo "added_files=${ADDED_FILES}" >> $GITHUB_OUTPUT
          echo "modified_files=${MODIFIED_FILES}" >> $GITHUB_OUTPUT
          echo "deleted_files=${DELETED_FILES}" >> $GITHUB_OUTPUT

      - name: Trigger Index New/Modified Documents or full reindex
        id: reindex
        run: |
          CLEAN="${{ steps.change_detection.outputs.clean }}"
          ENDPOINT="${{ steps.fqdn.outputs.fqdn }}/api/reindex"

          echo "🔄 Starting reindex..."
          echo "Endpoint: ${ENDPOINT}"
          echo "Clean mode: ${CLEAN}"

          echo "⏳ Cooling down before triggering..."
          sleep 10

          if [ "${CLEAN}" == "true" ]; then
            QUERY_PARAMS="?clean=true"
          else
            QUERY_PARAMS="?clean=false"
          fi

          MAX_ATTEMPTS=7

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt/$MAX_ATTEMPTS..."

            RESPONSE_HEADERS=$(mktemp)

            HTTP_CODE=$(curl -sS -X POST \
              -H "Content-Type: application/json" \
              -D $RESPONSE_HEADERS \
              -o /tmp/reindex_response.json \
              -w "%{http_code}" \
              "${ENDPOINT}${QUERY_PARAMS}" \
              --max-time 300 \
              --connect-timeout 30 || echo "000")

            BODY=$(cat /tmp/reindex_response.json 2>/dev/null || echo "")

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" == "200" ]; then
              echo "✅ Reindex completed successfully"
              echo "reindex_success=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ "$HTTP_CODE" == "429" ]; then
              RETRY_AFTER=$(grep -i "retry-after" $RESPONSE_HEADERS | awk '{print $2}' | tr -d '\r')

              if [ -z "$RETRY_AFTER" ]; then
                WAIT_TIME=$((60 * attempt))
              else
                WAIT_TIME=$((RETRY_AFTER + 5))
              fi

              echo "⚠️ Rate limit hit. Waiting ${WAIT_TIME}s..."
              sleep $WAIT_TIME
              continue
            fi

            if [ "$HTTP_CODE" == "500" ] || [ "$HTTP_CODE" == "502" ] || [ "$HTTP_CODE" == "503" ] || [ "$HTTP_CODE" == "504" ] || [ "$HTTP_CODE" == "000" ]; then
              echo "⚠️ Server/transient error. Retrying in 60s..."
              sleep 60
              continue
            fi

            echo "❌ Reindex failed with HTTP $HTTP_CODE"
            echo "Response: $BODY"
            break
          done

          echo "reindex_success=false" >> $GITHUB_OUTPUT
          exit 1

  verify-index:
    name: Verify Reindex Success
    runs-on: ubuntu-latest
    needs: [trigger-reindex]
    if: always()
    steps:
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR connection
        run: |
          az acr repository list \
            --name riskinsuredevacr \
            --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}" \
            --output table

      - name: Generate detailed summary
        run: |
          echo "## 🎯 Modernization Patterns - Reindex Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "**Result**: ${{ needs.trigger-reindex.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Reindex Strategy" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.trigger-reindex.outputs.trigger_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.trigger-reindex.outputs.metrics }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Indexed Content Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|" >> $GITHUB_STEP_SUMMARY
          echo "| Patterns Indexed | ${{ needs.trigger-reindex.outputs.patterns_indexed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Inbox Documents Indexed | ${{ needs.trigger-reindex.outputs.inbox_indexed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PDF (.pdf) | ${{ needs.trigger-reindex.outputs.pdf_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DOCX (.docx) | ${{ needs.trigger-reindex.outputs.docx_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown (.md/.markdown) | ${{ needs.trigger-reindex.outputs.md_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Text (.txt) | ${{ needs.trigger-reindex.outputs.txt_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON (.json) | ${{ needs.trigger-reindex.outputs.json_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Why This Strategy?" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Index New/Modified Documents: Fast incremental updates" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Full Clean: Ensures deleted docs are removed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.trigger-reindex.result }}" == "success" ]; then
            echo "✅ Chat API will automatically use updated patterns within 30 seconds" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Check Container App logs: az containerapp logs show -n modernizationpatterns-reindex -g CAIS-010-RiskInsure" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: needs.trigger-reindex.result == 'failure'
        run: |
          echo "❌ Reindex failed!"
          echo "Check Container App logs: modernizationpatterns-reindex"
          exit 1

      - name: Success notification
        if: needs.trigger-reindex.result == 'success'
        run: |
          echo "✅ Reindex completed successfully!"
          echo "Log into Container Apps to view detailed reindex logs"
