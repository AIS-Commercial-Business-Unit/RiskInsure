name: 'PR: Unit Tests'

# ============================================================================
# Purpose: Run fast unit tests on Pull Requests
# Triggers: PR to main/Dev with service changes
# Duration: ~5 minutes
# Blocks Merge: Yes (required check)
# ============================================================================

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/**'
      - 'platform/RiskInsure.PublicContracts/**'
      - '.github/workflows/pr-unit-tests.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  unit-tests:
    name: 'Unit Tests: ${{ matrix.service }}'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: billing
            path: services/billing/test/Unit.Tests
          - service: customer
            path: services/customer/test/Unit.Tests
          - service: fundstransfermgt
            path: services/fundstransfermgt/test/Unit.Tests
          - service: policy
            path: services/policy/test/Unit.Tests
          - service: ratingandunderwriting
            path: services/ratingandunderwriting/test/Unit.Tests
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore Dependencies
        run: dotnet restore
        working-directory: ${{ matrix.path }}
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: ${{ matrix.path }}
      
      - name: Run Unit Tests
        run: |
          dotnet test Unit.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
        working-directory: ${{ matrix.path }}
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.service }}
          path: ${{ matrix.path }}/TestResults/**/*.trx
          if-no-files-found: warn
      
      - name: Upload Code Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-${{ matrix.service }}
          path: ${{ matrix.path }}/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  test-summary:
    name: 'Test Summary'
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    
    steps:
      - name: Download All Test Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      
      - name: Publish Test Summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: ./artifacts/**/*.trx
          check_name: 'Unit Test Results'
          comment_mode: always
