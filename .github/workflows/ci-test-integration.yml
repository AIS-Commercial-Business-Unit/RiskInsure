name: 'CI: Integration Tests'

# ============================================================================
# Purpose: Run integration tests after services deployed
# Triggers: After service deployment completes OR on-demand
# Duration: ~8 minutes
# Blocks: No (informational, doesn't block deployment)
# CRITICAL: Only runs AFTER infrastructure and services exist
# ============================================================================

on:
  workflow_run:
    workflows: ['CD: Services Dev']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to test (comma-separated or "all")'
        required: true
        default: 'all'
      environment:
        description: 'Environment to test'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  # ==========================================================================
  # Verify Infrastructure Exists (Fail-Fast Check)
  # ==========================================================================
  verify-infrastructure:
    name: 'Verify Infrastructure Ready'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      servicebus_namespace: ${{ steps.check.outputs.servicebus_namespace }}
      cosmosdb_account: ${{ steps.check.outputs.cosmosdb_account }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Check Infrastructure
        id: check
        shell: bash
        run: |
          echo "🔍 Checking infrastructure readiness..."
          
          RG="CAIS-010-RiskInsure"
          
          # Check Service Bus
          SB_NAMESPACE=$(az servicebus namespace list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$SB_NAMESPACE" ]; then
            echo "❌ Service Bus namespace not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "servicebus_namespace=$SB_NAMESPACE"
          
          # Check endpoint queues only
          REQUIRED_QUEUES=(
            "riskinsure.customer.endpoint"
            "riskinsure.fundtransfermgt.endpoint"
            "riskinsure.policy.endpoint"
            "riskinsure.ratingandunderwriting.endpoint"
            "riskinsure.customerrelationshipsmgt.endpoint"
            "riskinsure.policyequityandinvoicingmgt.endpoint"
            "riskinsure.policylifecyclemgt.endpoint"
            "riskinsure.riskratingandunderwriting.endpoint"
          )
          
          for queue in "${REQUIRED_QUEUES[@]}"; do
            if ! az servicebus queue show --resource-group "$RG" --namespace-name "$SB_NAMESPACE" --name "$queue" &>/dev/null; then
              echo "❌ Queue $queue not found"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Queue: $queue"
          done
          
          # Check Cosmos DB
          COSMOS_ACCOUNT=$(az cosmosdb list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$COSMOS_ACCOUNT" ]; then
            echo "❌ Cosmos DB account not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "cosmosdb_account=$COSMOS_ACCOUNT" >> "$GITHUB_OUTPUT"
          echo "✅ Cosmos DB account: $COSMOS_ACCOUNT"
          
          # Check Cosmos DB containers
          COSMOS_DB="RiskInsure"
          REQUIRED_CONTAINERS=(
            "customer"
            "Customer-Sagas"
            "policy"
            "Policy-Sagas"
            "RatingUnderwriting"
            "ratingunderwriting-sagas"
            "fundstransfermgt"
            "fundstransfermgt-sagas"
            "customerrelationships"
            "CustomerRelationshipsMgt-Sagas"
            "policylifecycle"
            "policylifecycle-sagas"
            "PolicyEquityAndInvoicingMgt"
            "PolicyEquityAndInvoicingMgt-Sagas"
            "riskratingandunderwriting"
            "RatingUnderwriting-Sagas"
          )
          
          for container in "${REQUIRED_CONTAINERS[@]}"; do
            if ! az cosmosdb sql container show \
                --resource-group "$RG" \
                --account-name "$COSMOS_ACCOUNT" \
                --database-name "$COSMOS_DB" \
                --name "$container" &>/dev/null; then
              echo "❌ Cosmos DB container '$container' not found in database '$COSMOS_DB'"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Cosmos DB container: $container"
          done
          
          # Check Container Apps are running
          SERVICES=("customer" "crmgt" "fundstransfermgt" "policy" "peimgt" "policylifecyclemgt" "ratingandunderwriting" "rru")
          for service in "${SERVICES[@]}"; do
            API_NAME="$service-api"
            ENDPOINT_NAME="$service-endpoint"
            
            API_STATUS=$(az containerapp show --resource-group "$RG" --name "$API_NAME" --query "properties.runningStatus" -o tsv 2>/dev/null || echo "NotFound")
            ENDPOINT_STATUS=$(az containerapp show --resource-group "$RG" --name "$ENDPOINT_NAME" --query "properties.runningStatus" -o tsv 2>/dev/null || echo "NotFound")
            
            if [[ "$API_STATUS" != "Running" ]]; then
              echo "❌ Container app $API_NAME status: $API_STATUS"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            
            if [[ "$ENDPOINT_STATUS" != "Running" ]]; then
              echo "❌ Container app $ENDPOINT_NAME status: $ENDPOINT_STATUS"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            
            echo "✅ Container App API: $API_NAME ($API_STATUS)"
            echo "✅ Container App Endpoint: $ENDPOINT_NAME ($ENDPOINT_STATUS)"
          done
          
          echo ""
          echo "🎉 All infrastructure ready for integration tests!"
          echo "ready=true" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Determine which services to test
  # ==========================================================================
  determine-services:
    name: 'Determine Test Scope'
    needs: verify-infrastructure
    if: ${{ needs.verify-infrastructure.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Determine Services
        id: determine
        shell: bash
        run: |
          to_service_matrix() {
            jq -R -s -c '
              split(",")
              | map(gsub("^\\s+|\\s+$"; ""))
              | map(select(length > 0))
              | map(
                  if . == "crmgt" then { name: "crmgt", path: "customerrelationshipsmgt" }
                  elif . == "peimgt" then { name: "peimgt", path: "policyequityandinvoicingmgt" }
                  elif . == "rru" then { name: "rru", path: "riskratingandunderwriting" }
                  else { name: ., path: . }
                  end
                )
            '
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo 'services=[{"name":"customer","path":"customer"},{"name":"crmgt","path":"customerrelationshipsmgt"},{"name":"fundstransfermgt","path":"fundstransfermgt"},{"name":"policy","path":"policy"},{"name":"peimgt","path":"policyequityandinvoicingmgt"},{"name":"policylifecyclemgt","path":"policylifecyclemgt"},{"name":"ratingandunderwriting","path":"ratingandunderwriting"},{"name":"rru","path":"riskratingandunderwriting"}]' >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | to_service_matrix)
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
            fi
          else
            # Test all services after deployment
            echo 'services=[{"name":"customer","path":"customer"},{"name":"crmgt","path":"customerrelationshipsmgt"},{"name":"fundstransfermgt","path":"fundstransfermgt"},{"name":"policy","path":"policy"},{"name":"peimgt","path":"policyequityandinvoicingmgt"},{"name":"policylifecyclemgt","path":"policylifecyclemgt"},{"name":"ratingandunderwriting","path":"ratingandunderwriting"},{"name":"rru","path":"riskratingandunderwriting"}]' >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # Run Integration Tests (Matrix per service)
  # ==========================================================================
  integration-tests:
    name: 'Integration: ${{ matrix.service.name }}'
    needs: [verify-infrastructure, determine-services]
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      checks: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Map Service Paths
        id: map
        shell: bash
        run: |
          TEST_DIR="services/${{ matrix.service.path }}/test/Integration.Tests"

          echo "service_name=${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"
          echo "test_dir=$TEST_DIR" >> "$GITHUB_OUTPUT"

          if [[ -f "$TEST_DIR/package-lock.json" ]]; then
            echo "use_cache=true" >> "$GITHUB_OUTPUT"
            echo "cache_path=$TEST_DIR/package-lock.json" >> "$GITHUB_OUTPUT"
          else
            echo "use_cache=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Setup Node.js
        if: ${{ steps.map.outputs.use_cache == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ steps.map.outputs.cache_path }}

      - name: Setup Node.js
        if: ${{ steps.map.outputs.use_cache != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install Playwright Dependencies
        run: npm install --no-audit --no-fund
        working-directory: ${{ steps.map.outputs.test_dir }}
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ${{ steps.map.outputs.test_dir }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get Service URL
        id: url
        shell: bash
        run: |
          SERVICE="${{ steps.map.outputs.service_name }}"
          RG="CAIS-010-RiskInsure"
          
          FQDN=$(az containerapp show --resource-group "$RG" --name "$SERVICE-api" --query "properties.configuration.ingress.fqdn" -o tsv)
          SERVICE_URL="https://$FQDN"
          
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "📍 Service URL: $SERVICE_URL"
          
          # Set environment variable for tests: API_{UPPERCASE_SERVICE}_BASE_URL
          SERVICE_UPPER=$(echo "$SERVICE" | tr '[:lower:]' '[:upper:]')
          echo "API_${SERVICE_UPPER}_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
      
      - name: Run Integration Tests
        run: npm test
        working-directory: ${{ steps.map.outputs.test_dir }}
        env:
          CI: true
          API_BASE_URL: ${{ steps.url.outputs.service_url }}
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ steps.map.outputs.service_name }}
          path: ${{ steps.map.outputs.test_dir }}/test-results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.map.outputs.service_name }}
          path: ${{ steps.map.outputs.test_dir }}/playwright-report/
          retention-days: 15
          if-no-files-found: warn

  # ==========================================================================
  # Test Summary
  # ==========================================================================
  test-summary:
    name: 'Test Summary'
    needs: [verify-infrastructure, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🧪 Integration Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ github.event.inputs.environment || 'dev' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure Check | ${{ needs['verify-infrastructure'].result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration Tests | ${{ needs['integration-tests'].result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs['integration-tests'].result }}" == "success" ]]; then
            echo "✅ All integration tests passed!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some integration tests failed. Check the logs and Playwright reports." >> "$GITHUB_STEP_SUMMARY"
          fi
