name: 'CI: Integration Tests'

# ============================================================================
# Purpose: Run integration tests after services deployed
# Triggers: After service deployment completes OR on-demand
# Duration: ~8 minutes
# Blocks: No (informational, doesn't block deployment)
# CRITICAL: Only runs AFTER infrastructure and services exist
# ============================================================================

on:
  workflow_run:
    workflows: ['CD: Services Dev']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to test (comma-separated or "all")'
        required: true
        default: 'all'
      environment:
        description: 'Environment to test'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  # ==========================================================================
  # Verify Infrastructure Exists (Fail-Fast Check)
  # ==========================================================================
  verify-infrastructure:
    name: 'Verify Infrastructure Ready'
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      servicebus_namespace: ${{ steps.check.outputs.servicebus_namespace }}
      cosmosdb_account: ${{ steps.check.outputs.cosmosdb_account }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Check Infrastructure
        id: check
        shell: bash
        run: |
          echo "🔍 Checking infrastructure readiness..."
          
          RG="CAIS-010-RiskInsure"
          
          # Check Service Bus
          SB_NAMESPACE=$(az servicebus namespace list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$SB_NAMESPACE" ]; then
            echo "❌ Service Bus namespace not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "servicebus_namespace=$SB_NAMESPACE" >> "$GITHUB_OUTPUT"
          
          # Check endpoint queues only
          REQUIRED_QUEUES=(
            "RiskInsure.Billing.Endpoint"
            "RiskInsure.Customer.Endpoint"
            "RiskInsure.FundTransferMgt.Endpoint"
            "RiskInsure.Policy.Endpoint"
            "RiskInsure.RatingAndUnderwriting.Endpoint"
          )
          
          for queue in "${REQUIRED_QUEUES[@]}"; do
            if ! az servicebus queue show --resource-group "$RG" --namespace-name "$SB_NAMESPACE" --name "$queue" &>/dev/null; then
              echo "❌ Queue $queue not found"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Queue: $queue"
          done
          
          # Check Cosmos DB
          COSMOS_ACCOUNT=$(az cosmosdb list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$COSMOS_ACCOUNT" ]; then
            echo "❌ Cosmos DB account not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "cosmosdb_account=$COSMOS_ACCOUNT" >> "$GITHUB_OUTPUT"
          
          # Check Container Apps are running
          SERVICES=("billing" "customer" "fundstransfermgt" "policy" "ratingandunderwriting")
          for service in "${SERVICES[@]}"; do
            API_NAME="$service-api"
            ENDPOINT_NAME="$service-endpoint"
            
            API_STATUS=$(az containerapp show --resource-group "$RG" --name "$API_NAME" --query "properties.runningStatus" -o tsv 2>/dev/null || echo "NotFound")
            ENDPOINT_STATUS=$(az containerapp show --resource-group "$RG" --name "$ENDPOINT_NAME" --query "properties.runningStatus" -o tsv 2>/dev/null || echo "NotFound")
            
            if [[ "$API_STATUS" != "Running" ]]; then
              echo "❌ Container app $API_NAME status: $API_STATUS"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            
            if [[ "$ENDPOINT_STATUS" != "Running" ]]; then
              echo "❌ Container app $ENDPOINT_NAME status: $ENDPOINT_STATUS"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            
            echo "✅ Container App API: $API_NAME ($API_STATUS)"
            echo "✅ Container App Endpoint: $ENDPOINT_NAME ($ENDPOINT_STATUS)"
          done
          
          echo ""
          echo "🎉 All infrastructure ready for integration tests!"
          echo "ready=true" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Determine which services to test
  # ==========================================================================
  determine-services:
    name: 'Determine Test Scope'
    needs: verify-infrastructure
    if: ${{ needs.verify-infrastructure.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Determine Services
        id: determine
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
            fi
          else
            # Test all services after deployment
            echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # Run Integration Tests (Matrix per service)
  # ==========================================================================
  integration-tests:
    name: 'Integration: ${{ matrix.service }}'
    needs: [verify-infrastructure, determine-services]
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read
      checks: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/test/Integration.Tests/package-lock.json
      
      - name: Install Playwright Dependencies
        run: npm install --no-audit --no-fund
        working-directory: services/${{ matrix.service }}/test/Integration.Tests
      
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: services/${{ matrix.service }}/test/Integration.Tests
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get Service URL
        id: url
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          RG="CAIS-010-RiskInsure"
          
          FQDN=$(az containerapp show --resource-group "$RG" --name "$SERVICE-api" --query "properties.configuration.ingress.fqdn" -o tsv)
          SERVICE_URL="https://$FQDN"
          
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "📍 Service URL: $SERVICE_URL"
          
          # Set environment variable for tests based on service
          case "$SERVICE" in
            billing)
              echo "API_BILLING_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
              ;;
            customer)
              echo "API_CUSTOMER_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
              ;;
            fundstransfermgt)
              echo "API_FUNDSTRANSFERMGT_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
              ;;
            policy)
              echo "API_POLICY_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
              ;;
            ratingandunderwriting)
              echo "API_RATINGANDUNDERWRITING_BASE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
              ;;
          esac
      
      - name: Run Integration Tests
        run: npm test
        working-directory: services/${{ matrix.service }}/test/Integration.Tests
        env:
          CI: true
          API_BASE_URL: ${{ steps.url.outputs.service_url }}
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test/Integration.Tests/test-results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.service }}
          path: services/${{ matrix.service }}/test/Integration.Tests/playwright-report/
          retention-days: 15
          if-no-files-found: warn

  # ==========================================================================
  # Test Summary
  # ==========================================================================
  test-summary:
    name: 'Test Summary'
    needs: [verify-infrastructure, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🧪 Integration Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ github.event.inputs.environment || 'dev' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure Check | ${{ needs['verify-infrastructure'].result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration Tests | ${{ needs['integration-tests'].result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs['integration-tests'].result }}" == "success" ]]; then
            echo "✅ All integration tests passed!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some integration tests failed. Check the logs and Playwright reports." >> "$GITHUB_STEP_SUMMARY"
          fi
