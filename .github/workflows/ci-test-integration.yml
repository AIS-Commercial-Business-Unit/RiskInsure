name: 'CI: Integration Tests'

# ============================================================================
# Purpose: Run integration tests after services deployed
# Triggers: After service deployment completes OR on-demand
# Duration: ~8 minutes
# Blocks: No (informational, doesn't block deployment)
# CRITICAL: Only runs AFTER infrastructure and services exist
# ============================================================================

on:
  workflow_run:
    workflows: ['CD: Services Dev']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to test (comma-separated or "all")'
        required: true
        default: 'all'
      environment:
        description: 'Environment to test'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

env:
  DOTNET_VERSION: '10.0.x'
  PLAYWRIGHT_VERSION: '1.40.0'

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  # ==========================================================================
  # Verify Infrastructure Exists (Fail-Fast Check)
  # ==========================================================================
  verify-infrastructure:
    name: 'Verify Infrastructure Ready'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    permissions:
      id-token: write
      contents: read
    
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      servicebus_namespace: ${{ steps.check.outputs.servicebus_namespace }}
      cosmosdb_account: ${{ steps.check.outputs.cosmosdb_account }}
    
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Check Infrastructure
        id: check
        shell: bash
        run: |
          echo "🔍 Checking infrastructure readiness..."
          
          RG="CAIS-010-RiskInsure"
          
          # Check Service Bus
          SB_NAMESPACE=$(az servicebus namespace list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$SB_NAMESPACE" ]; then
            echo "❌ Service Bus namespace not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "servicebus_namespace=$SB_NAMESPACE" >> "$GITHUB_OUTPUT"
          
          # Check required queues
          REQUIRED_QUEUES=(
            "riskinsure.billing.api"
            "riskinsure.customer.api"
            "riskinsure.fundstransfermgt.api"
            "riskinsure.policy.api"
            "riskinsure.ratingandunderwriting.api"
          )
          
          for queue in "${REQUIRED_QUEUES[@]}"; do
            if ! az servicebus queue show --resource-group "$RG" --namespace-name "$SB_NAMESPACE" --name "$queue" &>/dev/null; then
              echo "❌ Queue $queue not found"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Queue: $queue"
          done
          
          # Check Cosmos DB
          COSMOS_ACCOUNT=$(az cosmosdb list --resource-group "$RG" --query "[0].name" -o tsv)
          if [ -z "$COSMOS_ACCOUNT" ]; then
            echo "❌ Cosmos DB account not found"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "cosmosdb_account=$COSMOS_ACCOUNT" >> "$GITHUB_OUTPUT"
          
          # Check Container Apps are running
          SERVICES=("billing" "customer" "fundstransfermgt" "policy" "ratingandunderwriting")
          for service in "${SERVICES[@]}"; do
            APP_STATUS=$(az containerapp show --resource-group "$RG" --name "riskinsure-$service-app" --query "properties.runningStatus" -o tsv 2>/dev/null || echo "NotFound")
            if [[ "$APP_STATUS" != "Running" ]]; then
              echo "⚠️ Container app $service status: $APP_STATUS"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✅ Container App: $service ($APP_STATUS)"
          done
          
          echo ""
          echo "🎉 All infrastructure ready for integration tests!"
          echo "ready=true" >> "$GITHUB_OUTPUT"

  # ==========================================================================
  # Determine which services to test
  # ==========================================================================
  determine-services:
    name: 'Determine Test Scope'
    needs: verify-infrastructure
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.determine.outputs.services }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Determine Services
        id: determine
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.services }}" == "all" ]]; then
              echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
            else
              services_input="${{ github.event.inputs.services }}"
              services_json=$(echo "$services_input" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
              echo "services=$services_json" >> "$GITHUB_OUTPUT"
            fi
          else
            # Test all services after deployment
            echo "services=[\"billing\",\"customer\",\"fundstransfermgt\",\"policy\",\"ratingandunderwriting\"]" >> "$GITHUB_OUTPUT"
          fi

  # ==========================================================================
  # Run Integration Tests (Matrix per service)
  # ==========================================================================
  integration-tests:
    name: 'Integration: ${{ matrix.service }}'
    needs: [verify-infrastructure, determine-services]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    permissions:
      id-token: write
      contents: read
      checks: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Setup Playwright
        shell: bash
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI --version ${{ env.PLAYWRIGHT_VERSION }}
          playwright install --with-deps
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Get Service URL
        id: url
        shell: bash
        run: |
          SERVICE="${{ matrix.service }}"
          RG="CAIS-010-RiskInsure"
          
          FQDN=$(az containerapp show --resource-group "$RG" --name "riskinsure-$SERVICE-app" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "service_url=https://$FQDN" >> "$GITHUB_OUTPUT"
          echo "📍 Service URL: https://$FQDN"
      
      - name: Restore Dependencies
        working-directory: services/${{ matrix.service }}/test/IntegrationTests
        run: dotnet restore
      
      - name: Build Tests
        working-directory: services/${{ matrix.service }}/test/IntegrationTests
        run: dotnet build --no-restore --configuration Release
      
      - name: Run Integration Tests
        working-directory: services/${{ matrix.service }}/test/IntegrationTests
        env:
          SERVICE_BASE_URL: ${{ steps.url.outputs.service_url }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SERVICEBUS_NAMESPACE: ${{ needs.verify-infrastructure.outputs.servicebus_namespace }}
          COSMOSDB_ACCOUNT: ${{ needs.verify-infrastructure.outputs.cosmosdb_account }}
        run: |
          dotnet test \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=${{ matrix.service }}-integration-tests.trx" \
            --results-directory ./TestResults \
            -- RunConfiguration.CollectSourceInformation=true
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test/IntegrationTests/TestResults/*.trx
          retention-days: 7
      
      - name: Upload Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.service }}
          path: services/${{ matrix.service }}/test/IntegrationTests/playwright-traces/
          retention-days: 7

  # ==========================================================================
  # Test Summary
  # ==========================================================================
  test-summary:
    name: 'Test Summary'
    needs: integration-tests
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          pattern: integration-test-results-*
          merge-multiple: true
          path: test-results
      
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          check_name: 'Integration Test Results'
          files: 'test-results/**/*.trx'
          comment_mode: off
      
      - name: Generate Summary
        shell: bash
        run: |
          echo "# 🧪 Integration Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ github.event.inputs.environment || 'dev' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure Check | ${{ needs.verify-infrastructure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [[ "${{ needs.integration-tests.result }}" == "success" ]]; then
            echo "✅ All integration tests passed!" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some integration tests failed. Check the logs and Playwright traces." >> "$GITHUB_STEP_SUMMARY"
          fi
