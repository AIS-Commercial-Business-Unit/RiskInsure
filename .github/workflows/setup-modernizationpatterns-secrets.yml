name: 'Setup: Modernization Patterns Secrets'

# ============================================================================
# Purpose: One-time setup to store Azure AI secrets in Key Vault
# Triggers: Manual only (workflow_dispatch)
# Duration: ~1 minute
# Note: Run once to initialize secrets, then disable or delete this workflow
# ============================================================================

on:
  push:
    branches:
      - Dev
    paths:
      - 'platform/modernizationpatterns/**'
      - '.github/workflows/setup-modernizationpatterns-secrets.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - prod
      confirm:
        description: 'Type "CONFIRM" to proceed'
        type: string
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  setup-secrets:
    name: 'Store Secrets in Key Vault'
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate Confirmation (Manual Only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'CONFIRM'
        run: |
          echo "❌ You must type 'CONFIRM' to proceed"
          exit 1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Key Vault Name
        id: keyvault
        run: |
          # For push events, always use 'dev'
          # For manual runs, use the selected environment
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          else
            ENVIRONMENT="dev"
          fi
          
          if [ "$ENVIRONMENT" == "prod" ]; then
            echo "name=riskinsure-prod-kv" >> $GITHUB_OUTPUT
          else
            echo "name=riskinsure-dev-kv" >> $GITHUB_OUTPUT
          fi

      - name: Store Azure Search Endpoint
        run: |
          az keyvault secret set \
            --vault-name "${{ steps.keyvault.outputs.name }}" \
            --name "AzureSearchEndpoint" \
            --value "${{ secrets.AZURE_SEARCH_ENDPOINT }}"
          echo "✅ Stored AzureSearchEndpoint"

      - name: Store Azure Search API Key
        run: |
          az keyvault secret set \
            --vault-name "${{ steps.keyvault.outputs.name }}" \
            --name "AzureSearchApiKey" \
            --value "${{ secrets.AZURE_SEARCH_API_KEY }}"
          echo "✅ Stored AzureSearchApiKey"

      - name: Store Azure OpenAI Endpoint
        run: |
          az keyvault secret set \
            --vault-name "${{ steps.keyvault.outputs.name }}" \
            --name "AzureOpenAIEndpoint" \
            --value "${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          echo "✅ Stored AzureOpenAIEndpoint"

      - name: Store Azure OpenAI API Key
        run: |
          az keyvault secret set \
            --vault-name "${{ steps.keyvault.outputs.name }}" \
            --name "AzureOpenAIApiKey" \
            --value "${{ secrets.AZURE_OPENAI_API_KEY }}"
          echo "✅ Stored AzureOpenAIApiKey"

      - name: Summary
        run: |
          echo "## ✅ Secrets Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following secrets were stored in **${{ steps.keyvault.outputs.name }}**:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Name | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AzureSearchEndpoint | ✅ Stored |" >> $GITHUB_STEP_SUMMARY
          echo "| AzureSearchApiKey | ✅ Stored |" >> $GITHUB_STEP_SUMMARY
          echo "| AzureOpenAIEndpoint | ✅ Stored |" >> $GITHUB_STEP_SUMMARY
          echo "| AzureOpenAIApiKey | ✅ Stored |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Deploy infrastructure using \`CD: Infrastructure Dev\` workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Container Apps will automatically read these secrets from Key Vault" >> $GITHUB_STEP_SUMMARY
