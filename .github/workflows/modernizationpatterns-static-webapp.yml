name: Deploy Modernization Patterns Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # UI & content changes only (exclude API)
      - "platform/modernizationpatterns/src/**"
      - "platform/modernizationpatterns/content/**"
      - "platform/modernizationpatterns/public/**"
      - "platform/modernizationpatterns/package.json"
      - "platform/modernizationpatterns/vite.config.js"
      - "platform/modernizationpatterns/index.html"
      - ".github/workflows/modernizationpatterns-static-webapp.yml"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: platform/modernizationpatterns
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "platform/modernizationpatterns/dist"
          skip_app_build: true