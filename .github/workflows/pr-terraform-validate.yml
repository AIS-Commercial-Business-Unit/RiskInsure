name: 'PR: Terraform Validate'

# ============================================================================
# Purpose: Validate Terraform changes on Pull Requests
# Triggers: PR to main/Dev with infrastructure changes
# Duration: ~3 minutes
# Blocks Merge: Yes (required check)
# ============================================================================

on:
  pull_request:
    branches:
      - main
    paths:
      - 'platform/infra/**'
      - '.github/workflows/pr-terraform-validate.yml'
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.11.4'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: 'Validate: ${{ matrix.layer }}'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        layer:
          - foundation
          - shared-services
    
    defaults:
      run:
        shell: bash
        working-directory: platform/infra/${{ matrix.layer }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        run: terraform init -input=false -backend=false
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      
      - name: Post Validation to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const layer = '${{ matrix.layer }}';
            
            const output = `## Terraform Validation: \`${layer}\`
            
            #### Format Check 🖌️\`${{ steps.fmt.outcome }}\`
            #### Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Validation 🤖\`${{ steps.validate.outcome }}\`
            
            ✅ Terraform syntax is valid. Full plan will run after merge.
            
            *Pusher: @${{ github.actor }}, Workflow: \`${{ github.workflow }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
