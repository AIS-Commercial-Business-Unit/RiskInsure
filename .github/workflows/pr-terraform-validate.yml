name: 'PR: Terraform Validate'

# ============================================================================
# Purpose: Validate Terraform changes on Pull Requests
# Triggers: PR to main/Dev with infrastructure changes
# Duration: ~3 minutes
# Blocks Merge: Yes (required check)
# ============================================================================

on:
  pull_request:
    branches:
      - main
    paths:
      - 'platform/infra/**'
      - '.github/workflows/pr-terraform-validate.yml'
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.11.4'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: 'Validate: ${{ matrix.layer }}'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        layer:
          - foundation
          - shared-services
          - services
    
    defaults:
      run:
        shell: bash
        working-directory: platform/infra/${{ matrix.layer }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        run: terraform init -input=false -backend=false
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      
      - name: Post Validation to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const layer = '${{ matrix.layer }}';
            const marker = `<!-- tf-validate-${layer} -->`;

            const fmtOutcome  = '${{ steps.fmt.outcome }}';
            const initOutcome = '${{ steps.init.outcome }}';
            const valOutcome  = '${{ steps.validate.outcome }}';

            const fmtIcon  = fmtOutcome  === 'success' ? '✅' : '⚠️';
            const initIcon = initOutcome === 'success' ? '✅' : '❌';
            const valIcon  = valOutcome  === 'success' ? '✅' : '❌';

            const statusLine = valOutcome === 'success'
              ? '✅ Terraform syntax is valid. A full plan will run on deployment.'
              : '❌ Validation failed — fix errors before merging.';

            // Build body as an array to avoid bare pipe characters at column-0
            // inside the YAML block scalar (which YAML would misinterpret).
            const body = [
              marker,
              `## Terraform Validation: \`${layer}\``,
              '',
              '| Step | Result |',
              '|---|---|',
              `| Format Check 🖌️ | ${fmtIcon} \`${fmtOutcome}\` |`,
              `| Initialization ⚙️ | ${initIcon} \`${initOutcome}\` |`,
              `| Validation 🤖 | ${valIcon} \`${valOutcome}\` |`,
              '',
              statusLine,
              '',
              `*Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Commit: \`${{ github.sha }}\`*`,
            ].join('\n');

            // Find an existing comment with this layer's marker and update it,
            // otherwise create a new one. This prevents comment spam on re-pushes.
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
