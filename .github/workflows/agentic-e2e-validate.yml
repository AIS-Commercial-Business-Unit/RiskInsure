name: "CI: Agentic E2E Validate"

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Validation mode"
        type: choice
        required: true
        default: list
        options:
          - list
          - execute

permissions:
  contents: read

jobs:
  validate-generated-tests:
    name: Validate generated Playwright specs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: test/e2e/package-lock.json

      - name: Install dependencies
        working-directory: test/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: test/e2e
        run: npx playwright install --with-deps chromium

      - name: List generated tests
        if: ${{ inputs.run_mode == 'list' }}
        working-directory: test/e2e
        run: npx playwright test tests/generated --list

      - name: Execute generated tests
        if: ${{ inputs.run_mode == 'execute' }}
        working-directory: test/e2e
        env:
          CUSTOMER_API_URL: ${{ vars.API_CUSTOMER_BASE_URL }}
          RATING_API_URL: ${{ vars.API_RATINGANDUNDERWRITING_BASE_URL }}
          POLICY_API_URL: ${{ vars.API_POLICY_BASE_URL }}
          FUNDS_TRANSFER_API_URL: ${{ vars.API_FUNDSTRANSFERMGT_BASE_URL }}
          CUSTOMER_RELATIONSHIPS_MGT_API_URL: ${{ vars.API_CUSTOMER_RELATIONSHIPS_MGT_BASE_URL }}
          POLICY_EQUITY_AND_INVOICING_MGT_API_URL: ${{ vars.API_POLICY_EQUITY_AND_INVOICING_MGT_BASE_URL }}
          RISK_RATING_AND_UNDERWRITING_API_URL: ${{ vars.API_RISK_RATING_AND_UNDERWRITING_BASE_URL }}
          POLICY_LIFECYCLE_MGT_API_URL: ${{ vars.API_POLICY_LIFECYCLE_MGT_BASE_URL }}
          PREMIUM_API_URL: ${{ vars.API_PREMIUM_BASE_URL }}
        run: npx playwright test tests/generated --reporter=list

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-e2e-validation
          path: |
            test/e2e/playwright-report/**
            test/e2e/test-results/**
            test/e2e/test-results.json
