      - TrafficRouting__LifeCycleProcessingPercentage=100
      - Messaging__MessageBroker=${MESSAGE_BROKER}
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
