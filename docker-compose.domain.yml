        condition: service_completed_successfully
      cosmos-emulator:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - riskinsure


  # ============================================================================
  # One-shot Cosmos DB Schema Initializer
  # Runs once, creates DB + all containers in sequence before any domain service
  # starts — eliminates parallel-create burst that triggers 503/1007 throttling.
  # ============================================================================
  cosmos-init:
    build:
      context: .
      dockerfile: platform/templates/Dockerfile.api.compose
      args:
        PROJECT_PATH: platform/RiskInsure.CosmosInit/RiskInsure.CosmosInit.csproj
        IMPORT_SSL_CERTS_FOR: cosmosdb
        ASSEMBLY_NAME: RiskInsure.CosmosInit.dll
    environment:
      - ConnectionStrings__CosmosDb=${COSMOSDB_CONNECTION_STRING}
    depends_on:
      cosmos-emulator:
        condition: service_healthy
    restart: "no"
    networks:
      - riskinsure

networks:
  riskinsure:
