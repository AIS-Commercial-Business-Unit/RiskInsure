      dockerfile: platform/templates/Dockerfile.endpoint.compose
      args:
        PROJECT_PATH: services/PolicyLifeCycleMgt/src/Endpoint.In/Endpoint.In.csproj
        IMPORT_SSL_CERTS_FOR: cosmosdb
    volumes:
      - ./License.xml:/app/license.xml:ro
